function bookmarksView(){
  const bposts=S.posts.filter(p=>S.bookmarks.has(p.id));
  if(!bposts.length)return `<div class="empty">${ic('bookmark')}<h3>저장된 글이 없어요</h3><p>글의 저장 버튼을 눌러보세요</p></div>`;
  return bposts.map(p=>pcard(p)).join('');
}
let _dmReplyTo=null;
function dmView(){
  if(!S.dmTarget)return '';
  const msgs=S.dms.filter(d=>(d.from_nick===S.me&&d.to_nick===S.dmTarget)||(d.from_nick===S.dmTarget&&d.to_nick===S.me));
  const msgHtml=msgs.map(m=>{
    const isMine=m.from_nick===S.me;
    const deleted=m.deleted;
    const readMark=isMine?(m.read_at?`<span style="font-size:10px;color:var(--accent);margin-left:4px">읽음</span>`:`<span style="font-size:10px;color:var(--text3);margin-left:4px">전송됨</span>`):'';
    const imgHtml=m.img?`<div style="margin-top:6px;cursor:pointer" onclick="viewImg('${m.img}')"><img src="${m.img}" style="max-width:260px;max-height:200px;border-radius:10px;object-fit:cover;display:block"></div>`:'';
    const delBtn=isMine&&!deleted?`<span class="msg-act" onclick="deleteDM(${m.id})" title="삭제">${ic('trash','xs')}</span>`:'';
    const replyBtn=`<span class="msg-act" onclick="setDMReply(${m.id},'${escA(m.from_nick)}')" title="답장">↩</span>`;
    const reactBtn=`<span class="msg-act" onclick="toggleDMReactPop(event,${m.id})" title="반응">😊</span>`;
    // 반응
    const rxmap=m.reactions||{};const rxHtml=Object.entries(rxmap).map(([em,cnt])=>`<span class="msg-reaction">${em} ${cnt}</span>`).join('');
    // 답장 원본
    let replyHtml='';
    if(m.reply_to){const orig=msgs.find(x=>x.id===m.reply_to);if(orig)replyHtml=`<div class="msg-reply" style="margin-bottom:4px;cursor:pointer" onclick="document.getElementById('dm-${orig.id}')?.scrollIntoView({behavior:'smooth'})"><span class="rname">${esc(orig.from_nick)}</span> ${esc(plainText(orig.content||'').slice(0,40))}</div>`}
    return `<div class="chat-msg" id="dm-${m.id}"><div class="av sm"><img src="${avatarOf(m.from_nick)}"></div><div class="bubble"><div class="nm"><span class="nm-nick">${esc(m.from_nick)}</span><span class="time">${ago(m.created_at)}</span>${readMark}</div>${replyHtml}<div class="mtxt">${deleted?`<span style="color:var(--text3);font-style:italic">삭제된 메시지</span>`:parseMentions(esc(m.content))}</div>${imgHtml}${rxHtml?`<div class="msg-reactions">${rxHtml}</div>`:''}</div><div class="msg-actions">${replyBtn}${reactBtn}${delBtn}</div></div>`;
  }).join('')||`<div class="empty" style="padding:40px">${ic('msgCircle')}<h3>${esc(S.dmTarget)}님과의 대화를 시작하세요</h3></div>`;
  const replyBar=_dmReplyTo?`<div class="chat-reply-box"><div class="reply-to">↩ <b>${esc(_dmReplyTo.nick)}</b>에게 답장 중</div><button onclick="clearDMReply()" style="color:var(--text3)">${ic('x','xs')}</button></div>`:'';
  return `<div class="chat-wrap">
    <div class="chat-msgs" id="dm-msgs">${msgHtml}</div>
    <div id="dm-typing" style="padding:0 16px;display:none"></div>
    ${replyBar}
    <div class="chat-input">
      <div class="chat-input-box">
        <div class="chat-input-left">
          <label class="chat-tool-btn" title="이미지 첨부" style="cursor:pointer">${ic('image','sm')}<input type="file" accept="image/*" hidden onchange="dmAttachImg(this)"></label>
          <button class="chat-tool-btn" title="GIF" onclick="openDMGif()" style="font-size:11px;font-weight:800;color:var(--text2)">GIF</button>
        </div>
        <input id="dm-inp" placeholder="${esc(S.dmTarget)}에게 메시지 보내기..." onkeydown="if(event.key==='Enter')sendDM()" oninput="broadcastTyping();setupMentionAutocomplete('dm-inp')" style="height:44px;flex:1;background:transparent;border:none;padding:0 8px;font-size:14px;color:var(--text)">
        <div class="chat-input-right">
          <button class="chat-tool-btn" onclick="toggleDMEmoji()" title="이모지">😊</button>
          <button class="chat-send-btn" onclick="sendDM()">${ic('send','sm')}</button>
        </div>
      </div>
    </div>
  </div>`;
}
function setDMReply(id,nick){_dmReplyTo={id,nick};render();setTimeout(()=>document.getElementById('dm-inp')?.focus(),50)}
function clearDMReply(){_dmReplyTo=null;render()}
function toggleDMReactPop(e,id){
  e.stopPropagation();
  const emojis=['👍','❤️','😂','😮','😢','🔥','👏','🎉'];
  let pop=document.getElementById('dm-react-pop');if(pop){pop.remove();return}
  pop=document.createElement('div');pop.id='dm-react-pop';
  pop.style.cssText=`position:fixed;top:${e.clientY-50}px;left:${e.clientX-80}px;background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:6px;display:flex;gap:4px;z-index:600;box-shadow:var(--shadow2);animation:pop .15s ease`;
  pop.innerHTML=emojis.map(em=>`<button style="font-size:20px;width:36px;height:36px;border-radius:8px;transition:.1s" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''" onclick="addDMReaction(${id},'${em}');this.closest('#dm-react-pop').remove()">${em}</button>`).join('');
  document.body.appendChild(pop);
  setTimeout(()=>document.addEventListener('click',()=>pop?.remove(),{once:true}),50);
}
async function addDMReaction(id,emoji){
  const msg=S.dms.find(m=>m.id===id);if(!msg)return;
  const rx={...(msg.reactions||{})};rx[emoji]=(rx[emoji]||0)+1;
  try{await sb.from('direct_messages').update({reactions:rx}).eq('id',id);msg.reactions=rx;render()}catch(e){}
}

function findForestView(){
  const forests=Object.values(S.forests);
  const categories=['전체','게임','창작','스터디','일상','잡담','기타'];
  const _cat=window._findCat||'전체';
  const _q=window._findQ||'';
  const filtered=forests.filter(f=>{
    const matchCat=_cat==='전체'||f.name.includes(_cat)||f.description?.includes(_cat)||f.emoji===({'게임':'🎮','창작':'🎨','스터디':'📚','일상':'🌿','잡담':'💬'}[_cat]||'');
    const matchQ=!_q||f.name.toLowerCase().includes(_q.toLowerCase())||f.description?.toLowerCase().includes(_q.toLowerCase());
    return matchCat&&matchQ;
  });
  const catBtns=categories.map(c=>`<button onclick="window._findCat='${c}';render()" style="padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;background:${_cat===c?'var(--accent)':'var(--card2)'};color:${_cat===c?'#fff':'var(--text2)'};border:1px solid ${_cat===c?'var(--accent)':'var(--line)'}">${c}</button>`).join('');
  const cards=filtered.map(f=>{
    const joined=S.myForests.has(f.id);
    const banner=f.banner?`url(${f.banner}) center/cover`:`linear-gradient(135deg,${f.color}cc,${f.color}55)`;
    return `<div class="disc-fcard" onclick="goForest('${f.id}')">
      <div class="disc-fcard-banner" style="background:${banner}">
        <div class="disc-fcard-icon" style="border-color:var(--card)">
          ${f.icon?`<img src="${f.icon}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:`<span style="font-size:26px">${f.emoji}</span>`}
        </div>
      </div>
      <div class="disc-fcard-body">
        <div class="disc-fcard-name">${esc(f.name)}</div>
        <div class="disc-fcard-desc">${esc(f.description||'소개가 없어요')}</div>
        <div class="disc-fcard-meta">
          <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:4px"></span>${f.members||0}명</span>
          <span>${ic('edit','xs')} ${f.postCount||0}개 게시물</span>
        </div>
        <button class="disc-fcard-btn ${joined?'joined':''}" onclick="event.stopPropagation();toggleJoin('${f.id}')">${joined?'✓ 가입됨':'가입하기'}</button>
      </div>
    </div>`;
  }).join('');
  return `<div class="disc-find-wrap">
    <div class="disc-find-hero">
      <div style="font-size:28px;font-weight:800;margin-bottom:6px">🎋 대나무숲 탐색</div>
      <div style="font-size:14px;color:var(--text3);margin-bottom:18px">마음에 드는 숲을 찾아 가입해보세요</div>
      <input class="disc-find-search" placeholder="숲 이름이나 키워드로 검색..." value="${escA(_q)}" oninput="window._findQ=this.value;render()">
    </div>
    <div class="disc-find-cats">${catBtns}</div>
    <div class="disc-fcard-grid">${cards||`<div class="empty">${ic('compass')}<h3>해당하는 숲이 없어요</h3><p>직접 만들어보세요!</p></div>`}</div>
  </div>`;
}

function channelFeed(ch){
  const posts=S.posts.filter(p=>p.channel_id===ch.id&&!(p.title||'').startsWith('reply:'));
  const ci=`<div style="margin-bottom:14px;display:flex;gap:10px;align-items:center;cursor:text;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 16px" onclick="openCompose()"><div class="av sm ${S.me?'':'anon'}">${S.me?`<img src="${avatarOf(S.me)}">`:`${ic('user','xs')}`}</div><span style="color:var(--text3);flex:1">이 채널에 글을 남겨보세요...</span><span class="btn btn-primary" style="padding:6px 14px;font-size:13px">게시</span></div>`;
  const list=posts.length?posts.map(p=>pcard(p)).join(''):`<div class="empty">${ic('edit')}<h3>아직 글이 없어요</h3><p>첫 글을 남겨보세요!</p></div>`;
  return ci+list;
}
let chatReplyTo=null;
function chatView(ch){
  const msgs=S.posts.filter(p=>p.channel_id===ch.id).reverse();
  const emojis=['👍','❤️','😂','😮','😢','🔥'];
  const msgHtml=msgs.map(m=>{
    const nick=m.author||m.anon_nick;
    // 답글 표시 (이 메시지가 다른 메시지의 댓글인 경우 — comments[0]의 parent 활용은 복잡해서, 간이로 title에 reply:id 저장)
    const replyId=m.title?.startsWith('reply:')?parseInt(m.title.split(':')[1]):null;
    const replyMsg=replyId?msgs.find(x=>x.id===replyId):null;
    const replyHtml=replyMsg?`<div class="msg-reply" onclick="scrollToMsg(${replyId})"><span class="rname">${esc(replyMsg.author||replyMsg.anon_nick)}</span> ${esc(plainText(replyMsg.content).slice(0,40))}</div>`:'';
    // 반응
    const rmap=S.reactions[m.id]||{};
    const rHtml=Object.entries(rmap).map(([em,cnt])=>`<span class="msg-reaction ${S.myReactions.has(m.id+'|'+em)?'on':''}" onclick="toggleReaction(${m.id},'${em}')">${em} ${cnt}</span>`).join('');
    const imgHtml=(m.imgs&&m.imgs.length)?`<div class="post-imgs n${Math.min(m.imgs.length,2)}" style="max-width:300px;margin-top:6px">${m.imgs.slice(0,2).map(x=>`<img src="${x}" onclick="viewImg('${x}')" style="max-height:200px">`).join('')}</div>`:'';
    return `<div class="chat-msg" id="msg-${m.id}"><div class="av sm ${m.author?'':'anon'}" onclick="${m.author?`goProfile('${m.author}')`:''}"><img src="${m.author?avatarOf(m.author):''}"></div><div class="bubble"><div class="nm"><span class="nm-nick">${esc(nick)}</span>${m.author?getLvBadge(m.author):''}<span class="time">${ago(m.created_at)}</span></div>${replyHtml}<div class="mtxt">${parseMentions(renderRich(m.content))}</div>${imgHtml}${rHtml?`<div class="msg-reactions">${rHtml}</div>`:''}</div><div class="msg-actions"><span class="msg-act" onclick="setChatReply(${m.id},'${escA(nick)}')" title="답글">↩</span><span class="msg-act" onclick="toggleMsgReactPop(event,${m.id})" title="반응">😊</span>${m.author===S.me?`<span class="msg-act" onclick="delPost(${m.id})" title="삭제">${ic('trash','xs')}</span>`:''}</div></div>`;
  }).join('');
  const replyBar=chatReplyTo?`<div class="chat-reply-box"><div class="reply-to">${ic('back','xs')} <b>${esc(chatReplyTo.nick)}</b>에게 답장 중</div><button style="color:var(--text3)" onclick="clearChatReply()">${ic('x','xs')}</button></div>`:'';
  return `<div class="chat-wrap"><div class="chat-msgs" id="chat-msgs">${msgHtml||`<div class="empty" style="padding:40px">${ic('hash')}<h3>#${esc(ch.name)} 채팅을 시작하세요</h3><p>대화를 시작해보세요!</p></div>`}</div>${replyBar}<div class="chat-input"><div class="chat-input-box"><div class="chat-input-left"><button class="chat-tool-btn" onclick="document.getElementById('chat-file-in').click()" title="파일 첨부">${ic('plus','sm')}</button><input type="file" id="chat-file-in" hidden accept="image/*" onchange="chatAttachImg(this,${ch.id})"></div><input id="chat-inp" placeholder="#${esc(ch.name)}에 메시지 보내기..." onkeydown="if(event.key==='Enter')sendChat(${ch.id})"><div class="chat-input-right"><button class="chat-tool-btn" title="GIF" onclick="openGifPop(${ch.id})" style="font-size:11px;font-weight:800;color:var(--text2)">GIF</button><button class="chat-tool-btn" onclick="toggleChatEmoji(${ch.id})" title="이모지">😊</button><button class="chat-send-btn" onclick="sendChat(${ch.id})">${ic('send','sm')}</button></div></div></div></div>`;
}

let _showMemberPanel=true;
function _setPanelBlur(on){
  const root=document.getElementById('root');
  if(!root)return;
  if(on)root.classList.add('panel-open');
  else root.classList.remove('panel-open');
}
function toggleMemberPanel(){
  _showMemberPanel=!_showMemberPanel;
  S._pinOpen=false;S._notifOpen=false;
  render();
}
function togglePinPanel(){
  S._pinOpen=!S._pinOpen;
  if(S._pinOpen){S._notifOpen=false;_showMemberPanel=false;}
  _setPanelBlur(S._pinOpen||S._notifOpen);
  render();
}
function toggleNotifPanel(){
  S._notifOpen=!S._notifOpen;
  if(S._notifOpen){S._pinOpen=false;_showMemberPanel=false;}

}
function closeSidePanel(){
  S._pinOpen=false;S._notifOpen=false;
  _setPanelBlur(false);
  render();
}

function pinPanel(){
  if(!S._pinOpen)return '';
  const ch=S.channel?S.channels[S.channel]:null;
  // 핀된 글 = 채널의 글 중 likes 많은 상위 5개 (실제 pin 기능 없으므로 인기글로 대체)
  const pins=S.posts.filter(p=>S.channel?p.channel_id===S.channel:p.forest_id===S.forest)
    .filter(p=>{
      const ch=S.channels[p.channel_id];
      if(ch&&ch.type==='chat')return false;
      if((p.title||'').startsWith('reply:'))return false;
      return S.likeCounts[p.id]>0||(p.imgs&&p.imgs.length);
    })
    .sort((a,b)=>(S.likeCounts[b.id]||0)-(S.likeCounts[a.id]||0))
    .slice(0,8);
  const pinHtml=pins.length
    ?pins.map(p=>{
        const nick=p.author||p.anon_nick||'익명';
        const txt=p.title||plainText(p.content).slice(0,80)||'(내용 없음)';
        const imgHtml=p.imgs&&p.imgs[0]?`<img class="pin-img" src="${p.imgs[0]}">`:'';
        return `<div class="pin-item" onclick="openDetail(${p.id});closeSidePanel()">
          <div class="pin-meta">${ic('pin','xs')} <b>${esc(nick)}</b> · ${ago(p.created_at)}</div>
          <div class="pin-txt">${esc(txt)}</div>${imgHtml}
        </div>`;
      }).join('')
    :`<div class="empty" style="padding:40px 20px">${ic('pin')}<h3>핀된 메시지 없음</h3><p>인기 있는 글이 여기 표시돼요</p></div>`;
  return `<div class="slide-panel"><div class="slide-panel-head">${ic('pin','sm')}<h3>핀된 메시지</h3><div class="slide-panel-close" onclick="closeSidePanel()">${ic('x','sm')}</div></div><div class="slide-panel-body">${pinHtml}</div></div>`;
}

function notifPanel(){
  if(!S._notifOpen)return '';
  // 알림 데이터 생성 (DB + 활동 기반 통합)
  const notifs=[];
  // DB 알림
  S.notifications.forEach(n=>{
    notifs.push({type:n.type||'system',icon:n.type==='comment'?'💬':n.type==='like'?'❤️':n.type==='mention'?'@':n.type==='friend'?'👋':'🔔',txt:n.message||'알림',time:n.created_at,unread:!n.read_at,id:n.id,action:n.action_url?`go('home','detail')`:null});
  });
  // 친구 요청
  S.friendReqs.forEach(r=>{
    notifs.push({type:'friend',icon:'👋',txt:`<b>${esc(r.from_nick)}</b>님이 친구 요청을 보냈어요`,time:r.created_at,unread:true,action:`acceptFriend(${r.id})`});
  });
  // 내 글에 달린 최근 댓글
  if(S.me){
    const myPosts=S.posts.filter(p=>p.author===S.me);
    myPosts.forEach(p=>{
      (p.comments||[]).filter(c=>c.author!==S.me).slice(0,2).forEach(c=>{
        notifs.push({type:'comment',icon:'💬',txt:`<b>${esc(c.author||'익명')}</b>님이 "<b>${esc((p.title||plainText(p.content)).slice(0,20))}</b>"에 댓글을 남겼어요`,time:c.created_at,unread:false});
      });
    });
    // 내 글 좋아요 (likeCounts 기반 간이)
    myPosts.filter(p=>(S.likeCounts[p.id]||0)>0).slice(0,3).forEach(p=>{
      notifs.push({type:'like',icon:'❤️',txt:`"<b>${esc((p.title||plainText(p.content)).slice(0,20))}</b>" 글에 좋아요 <b>${S.likeCounts[p.id]}개</b>`,time:p.created_at,unread:false});
    });
  }
  notifs.sort((a,b)=>new Date(b.time)-new Date(a.time));
  const unread=notifs.filter(n=>n.unread);
  const read=notifs.filter(n=>!n.unread);
  const mkItem=n=>`<div class="notif-item ${n.unread?'unread':''}" ${n.action?`onclick="${n.action};closeSidePanel()"`:''}>
    <div class="notif-icon">${n.icon}</div>
    <div class="notif-body"><div class="ntxt">${n.txt}</div><div class="ntime">${ago(n.time)}</div></div>
  </div>`;
  const body=notifs.length
    ?`${unread.length?`<div class="notif-sep">새 알림</div>${unread.map(mkItem).join('')}`:''}
       ${read.length?`<div class="notif-sep">이전 알림</div>${read.map(mkItem).join('')}`:''}`
    :`<div class="empty" style="padding:40px 20px">${ic('bell')}<h3>알림이 없어요</h3><p>활동이 생기면 여기에 표시돼요</p></div>`;
  const unreadCnt=notifs.filter(n=>n.unread).length;
  return `<div class="slide-panel"><div class="slide-panel-head">${ic('bell','sm')}<h3>알림</h3>${unreadCnt?`<span style="background:var(--like);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px">${unreadCnt}</span>`:''}<div style="flex:1"></div>${unreadCnt?`<button style="font-size:12px;color:var(--accent);font-weight:600;padding:4px 8px" onclick="markAllNotifRead()">모두 읽음</button>`:''}<div class="slide-panel-close" onclick="closeSidePanel()">${ic('x','sm')}</div></div><div class="slide-panel-body">${body}</div></div>`;
}
function memberPanel(){
  if(!S.forest||!_showMemberPanel)return '';
  const f=S.forests[S.forest];if(!f)return '';
  // 멤버 데이터 (profiles에서 가져온 users + 실제 forest_members)
  const allNicks=Object.keys(S.users);
  // 온라인 = 최근 활동한 유저들 (간이: posts가 있거나 me)
  const active=_onlineUsers.size>0?_onlineUsers:new Set([...S.posts.filter(p=>p.forest_id===S.forest).map(p=>p.author).filter(Boolean)]);
  if(S.me)active.add(S.me);
  const online=allNicks.filter(n=>active.has(n));
  const offline=allNicks.filter(n=>!active.has(n)).slice(0,8);
  const memItem=(nick,isOnline)=>{
    const u=S.users[nick];
    const statusClass=isOnline?(nick===S.me?'online':'idle'):'offline';
    const statusText=nick===S.me?'온라인':(isOnline?'활동 중':'오프라인');
    const role=(S.memberRoles[S.forest]||{})[nick];
    const roleBadge=role==='owner'?`<span class="mem-role owner">👑</span>`:role==='mod'?`<span class="mem-role mod">🛡</span>`:'';
    const isOwner=f.owner===S.me;
    const roleBtn=isOwner&&nick!==S.me?`<button onclick="event.stopPropagation();setMemberRole('${f.id}','${nick}',${role==='mod'?`'member'`:`'mod'`})" style="font-size:10px;padding:2px 6px;border-radius:5px;background:var(--card3);color:var(--text3);margin-left:4px">${role==='mod'?'해제':'관리자'}</button>`:'';
    return `<div class="member-item" onclick="goProfile('${nick}')"><div class="av-wrap"><div class="av"><img src="${avatarOf(nick)}"></div><div class="status-ring ${statusClass}"></div></div><div class="mem-info"><div class="mem-name ${isOnline?'':'offline-name'}">${esc(nick)} ${roleBadge}</div><div class="mem-status">${statusText}</div></div>${roleBtn}</div>`;
  };
  const onlineHtml=online.length?`<div class="member-section-label">온라인 — ${online.length}</div>${online.map(n=>memItem(n,true)).join('')}`:'';
  const offlineHtml=offline.length?`<div class="member-section-label">오프라인 — ${offline.length}</div>${offline.map(n=>memItem(n,false)).join('')}`:'';
  return `<div class="member-panel"><div class="member-panel-head">${ic('users','sm')} 멤버</div><div class="member-panel-body">${onlineHtml}${offlineHtml}</div></div>`;

async function searchGif(q){
  _gifQuery=q;
  const grid=document.getElementById('gif-grid');if(!grid)return;
  grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text3)">로딩 중...</div>`;
  try{
    const endpoint=q==='trending'
      ?`https://tenor.googleapis.com/v2/featured?key=${TENOR_KEY}&limit=18&media_filter=gif&contentfilter=medium`
      :`https://tenor.googleapis.com/v2/search?key=${TENOR_KEY}&q=${encodeURIComponent(q)}&limit=18&media_filter=gif&contentfilter=medium`;
    const res=await fetch(endpoint);
    const data=await res.json();
    if(!data.results?.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text3)">결과 없음</div>`;return}
    grid.innerHTML=data.results.map(r=>{
      const url=r.media_formats?.tinygif?.url||r.media_formats?.gif?.url||'';
      return `<div onclick="sendGif('${url}')" style="cursor:pointer;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--card2)"><img src="${url}" style="width:100%;height:100%;object-fit:cover" loading="lazy"></div>`;
    }).join('');
  }catch(e){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text3)">불러오기 실패</div>`}
}

async function like(id){
  const liked=S.likes.has(id);const me=whoAmI();
  if(liked){S.likes.delete(id);S.likeCounts[id]=Math.max(0,(S.likeCounts[id]||1)-1)}
  else{
    S.likes.add(id);S.likeCounts[id]=(S.likeCounts[id]||0)+1;
    // 하트 팝 애니메이션
    document.querySelectorAll(`.act.liked .ico, .d-act.liked .ico`).forEach(el=>{
      el.style.animation='none';requestAnimationFrame(()=>{el.style.animation=''});
    });
  }
  render();
  try{if(liked)await sb.from('likes').delete().eq('post_id',id).eq('liker',me);else await sb.from('likes').insert({post_id:id,liker:me})}catch(e){}
}

      try{await sb.from('notifications').insert({to_nick:nick,from_nick:S.me||'익명',type:'mention',message:`<b>${esc(S.me||'익명')}</b>님이 댓글에서 멘션했어요`})}catch(_){}

// ═══ SUPABASE REALTIME ═══
let _rtChannel=null;
let _onlineUsers=new Set();
let _typingUsers={};  // {to_nick: {from_nick, timer}}
let _newPostsCount=0;
let _lastPostId=0;

function initRealtime(){
  if(_rtChannel)_rtChannel.unsubscribe();
  _rtChannel=sb.channel('bamboo_realtime',{config:{presence:{key:S.me||BID}}});

  // 온라인 상태
  _rtChannel.on('presence',{event:'sync'},()=>{
    const state=_rtChannel.presenceState();
    _onlineUsers=new Set(Object.values(state).flat().map(p=>p.user).filter(Boolean));
    // 멤버 패널 업데이트 (전체 re-render 없이)
    const panel=document.querySelector('.member-panel-body');
    if(panel)render();
  });
  _rtChannel.on('presence',{event:'join'},({key,newPresences})=>{
    newPresences.forEach(p=>{if(p.user&&p.user!==S.me){toast(`${p.user}님이 접속했어요 👋`,'info')}});
  });

  // 새 글/댓글 실시간
  _rtChannel.on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},payload=>{
    const p=payload.new;
    if(p.author===S.me)return;
    // 현재 보고 있는 채널이면 배너 표시
    if(p.channel_id===S.channel){
      _newPostsCount++;
      const banner=document.getElementById('new-posts-banner');
      if(banner)banner.textContent=`↑ 새 글 ${_newPostsCount}개`;
      else{
        const mb=document.querySelector('.main-body');
        if(mb){const b=document.createElement('div');b.id='new-posts-banner';b.className='new-posts-banner';b.textContent=`↑ 새 글 ${_newPostsCount}개`;b.onclick=()=>{_newPostsCount=0;b.remove();loadAll()};mb.prepend(b)}
      }
    }
    // 내 글에 새 댓글이면 알림
    if(p.channel_id!==S.channel)loadAll();
  });

  // 타이핑 실시간
  _rtChannel.on('broadcast',{event:'typing'},({payload})=>{
    if(!payload||payload.from===S.me)return;
    // DM 상대방 타이핑
    if(payload.to===S.me){
      clearTimeout(_typingUsers[payload.from]);
      _typingUsers[payload.from]=setTimeout(()=>{delete _typingUsers[payload.from];updateTypingUI()},3000);
      updateTypingUI();
    }
  });

  _rtChannel.subscribe(async(status)=>{
    if(status==='SUBSCRIBED'&&S.me){
      await _rtChannel.track({user:S.me,online_at:new Date().toISOString()});
    }
  });
}

function updateTypingUI(){
  const el=document.getElementById('dm-typing');
  if(!el)return;
  const typers=Object.keys(_typingUsers).filter(n=>n===S.dmTarget);
  if(typers.length){
    el.innerHTML=`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;color:var(--text3)"><div class="typing-dots"><span></span><span></span><span></span></div>${esc(typers[0])} 입력 중...</div>`;
    el.style.display='block';
  }else{el.style.display='none'}
}

function broadcastTyping(){
  if(!_rtChannel||!S.dmTarget||!S.me)return;
  _rtChannel.send({type:'broadcast',event:'typing',payload:{from:S.me,to:S.dmTarget}});
}

function openFollowModal(nick,tab='followers'){
  const u=S.users[nick];if(!u)return;
  let curTab=tab;
  const mkList=(t)=>{
    const list=t==='followers'?u.followers:u.following;
    if(!list.length)return `<div class="empty" style="padding:24px">${ic('users')}<h3>${t==='followers'?'팔로워':'팔로잉'}가 없어요</h3></div>`;
    return list.map(n=>`<div class="friend-item" onclick="goProfile('${n}');closeM()"><div class="av"><img src="${avatarOf(n)}"></div><div class="info"><div class="nm">${esc(n)} ${getLvBadge(n)}</div><div class="activity">${esc(S.users[n]?.bio||'')}</div></div></div>`).join('');
  };
  const tabs=(t)=>['followers','following'].map(k=>`<button onclick="document.getElementById('fw-tab-followers').style.fontWeight=document.getElementById('fw-tab-following').style.fontWeight='400';this.style.fontWeight='700';document.getElementById('fw-body').innerHTML='${escA('<div>loading</div>')}';document.getElementById('fw-body').innerHTML=window._fwRender('${nick}','${k==='followers'?'followers':'following'}')" id="fw-tab-${k}" style="flex:1;padding:10px;font-weight:${t===k?'700':'400'};font-size:14px;border-bottom:2px solid ${t===k?'var(--accent)':'transparent'};color:${t===k?'var(--accent)':'var(--text2)'};cursor:pointer;transition:.15s">${k==='followers'?`팔로워 ${u.followers.length}`:`팔로잉 ${u.following.length}`}</button>`).join('');
  window._fwRender=(n,t)=>mkList(t);
  modal(`<div class="modal-head"><h2>${esc(nick)}</h2><button class="modal-x" onclick="closeM()">${ic('x','sm')}</button></div><div style="display:flex;border-bottom:1px solid var(--line)">${tabs(curTab)}</div><div class="modal-body" id="fw-body" style="padding:12px">${mkList(curTab)}</div>`);
}

async function votePoll(postId,optIdx){
  if(!S.me){toast('로그인 필요');openAuth();return}
  const hasVoted=[...S.myPollVotes].some(k=>k.startsWith(postId+'|'));
  if(hasVoted){toast('이미 투표했어요');return}
  try{
    await sb.from('poll_votes').insert({post_id:postId,option_idx:optIdx,voter:S.me});
    S.myPollVotes.add(postId+'|'+optIdx);
    if(!S.polls[postId])S.polls[postId]={};
    S.polls[postId][optIdx]=(S.polls[postId][optIdx]||0)+1;
    toast('투표했어요!');render();
  }catch(e){toast('투표 실패')}
}
function renderPoll(post){
  const poll=post.poll;if(!poll||!poll.options)return '';
  const totalVotes=Object.values(S.polls[post.id]||{}).reduce((a,b)=>a+b,0);
  const hasVoted=[...S.myPollVotes].some(k=>k.startsWith(post.id+'|'));
  const opts=poll.options.map((opt,i)=>{
    const cnt=(S.polls[post.id]||{})[i]||0;
    const pct=totalVotes?Math.round(cnt/totalVotes*100):0;
    const myVote=S.myPollVotes.has(post.id+'|'+i);
    return `<div class="poll-option" onclick="${hasVoted?'':'votePoll('+post.id+','+i+')'}">
      <div class="poll-bar-wrap" style="flex:1">
        <div class="poll-bar" style="width:${pct}%;background:${myVote?'var(--accent)':'var(--accent-soft)'}"></div>
        <span class="poll-bar-label">${esc(opt)}${myVote?' ✓':''}</span>
        <span class="poll-bar-pct">${hasVoted?pct+'%':''}</span>
      </div>
    </div>`;
  }).join('');
  return `<div class="poll-wrap"><div style="font-size:13px;font-weight:700;margin-bottom:10px">📊 ${esc(poll.question||'투표')}</div>${opts}<div class="poll-meta">총 ${totalVotes}표${poll.ends_at?` · ${ago(poll.ends_at)} 종료`:''}</div></div>`;
}

// ═══ 멘션 자동완성 ═══
let _mentionState={active:false,query:'',inputId:null,selectedIdx:0,matches:[]};

function setupMentionAutocomplete(inputId){
  const inp=document.getElementById(inputId);
  if(!inp||inp._mentionSetup)return;
  inp._mentionSetup=true;

  inp.addEventListener('input',function(){
    const val=this.value;
    const cursor=this.selectionStart;
    // @ 뒤의 텍스트 찾기
    const before=val.slice(0,cursor);
    const atMatch=before.match(/@(\w*)$/);
    if(atMatch){
      const q=atMatch[1].toLowerCase();
      _mentionState.active=true;
      _mentionState.query=q;
      _mentionState.inputId=inputId;
      _mentionState.selectedIdx=0;
      _mentionState.matches=Object.keys(S.users)
        .filter(n=>n.toLowerCase().startsWith(q)||n.toLowerCase().includes(q))
        .filter(n=>n!==S.me)
        .slice(0,6);
      showMentionPop(this);
    }else{
      closeMentionPop();
    }
  });

  inp.addEventListener('keydown',function(e){
    if(!_mentionState.active||!_mentionState.matches.length)return;
    if(e.key==='ArrowDown'){
      e.preventDefault();
      _mentionState.selectedIdx=(_mentionState.selectedIdx+1)%_mentionState.matches.length;
      updateMentionPop();
    }else if(e.key==='ArrowUp'){
      e.preventDefault();
      _mentionState.selectedIdx=(_mentionState.selectedIdx-1+_mentionState.matches.length)%_mentionState.matches.length;
      updateMentionPop();
    }else if(e.key==='Enter'||e.key==='Tab'){
      if(_mentionState.active&&_mentionState.matches.length){
        e.preventDefault();
        pickMention(_mentionState.matches[_mentionState.selectedIdx]);
      }
    }else if(e.key==='Escape'){
      closeMentionPop();
    }
  });

  inp.addEventListener('blur',function(){
    setTimeout(closeMentionPop,150);
  });
}

function showMentionPop(inputEl){
  let pop=document.getElementById('mention-autocomplete');
  if(!pop){
    pop=document.createElement('div');
    pop.id='mention-autocomplete';
    pop.className='mention-pop';
    document.body.appendChild(pop);
  }
  const rect=inputEl.getBoundingClientRect();
  pop.style.position='fixed';
  pop.style.left=rect.left+'px';
  pop.style.bottom=(window.innerHeight-rect.top+4)+'px';
  pop.style.display='block';
  updateMentionPop();
}

function updateMentionPop(){
  const pop=document.getElementById('mention-autocomplete');
  if(!pop)return;
  const {matches,selectedIdx,query}=_mentionState;
  if(!matches.length){
    pop.innerHTML=`<div style="padding:12px;font-size:13px;color:var(--text3);text-align:center">일치하는 사용자 없음</div>`;
    return;
  }
  pop.innerHTML=matches.map((nick,i)=>{
    const u=S.users[nick];
    return `<div class="mention-item ${i===selectedIdx?'selected':''}" onmousedown="event.preventDefault();pickMention('${nick}')">
      <div class="av"><img src="${avatarOf(nick)}" style="width:28px;height:28px;border-radius:50%"></div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px">${esc(nick)}</div>
        ${u?.bio?`<div style="font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(u.bio)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function pickMention(nick){
  const inp=document.getElementById(_mentionState.inputId);
  if(!inp)return;
  const val=inp.value;
  const cursor=inp.selectionStart;
  const before=val.slice(0,cursor);
  const after=val.slice(cursor);
  // @query 부분을 @nick 으로 교체
  const newBefore=before.replace(/@(\w*)$/,'@'+nick+' ');
  inp.value=newBefore+after;
  inp.focus();
  inp.selectionStart=inp.selectionEnd=newBefore.length;
  closeMentionPop();
}

function closeMentionPop(){
  _mentionState.active=false;
  const pop=document.getElementById('mention-autocomplete');
  if(pop)pop.style.display='none';
}

function getWeeklyTop(){
  const week=Date.now()-7*24*3600*1000;
  return S.posts
    .filter(p=>{
      const ch=S.channels[p.channel_id];
      if(ch&&ch.type==='chat')return false;  // 채팅글 제외
      if((p.title||'').startsWith('reply:'))return false;  // 답장글 제외
      if(!p.title&&!plainText(p.content))return false;  // 빈글 제외
      return new Date(p.created_at).getTime()>week;
    })
    .sort((a,b)=>((S.likeCounts[b.id]||0)*2+b.comments.length)-((S.likeCounts[a.id]||0)*2+a.comments.length))
    .slice(0,5);
}

function modal(h){const o=document.createElement('div');o.className='overlay';o.id='ov';o.onclick=e=>{if(e.target===o)closeM()};o.innerHTML=`<div class="modal">${h}</div>`;document.body.appendChild(o);document.getElementById('root')?.classList.add('blurred')}
function _setModalContent(h){let o=document.getElementById('ov');if(o){o.querySelector('.modal').innerHTML=h}else{modal(h)}}
function closeM(){hideToolbar();document.getElementById('ov')?.remove();document.getElementById('root')?.classList.remove('blurred')}
function toast(m,type='success'){
  // 기존 토스트 위로 밀어올리기
  document.querySelectorAll('.toast').forEach(t=>{
    const bot=parseInt(t.style.bottom||'28');
    t.style.bottom=(bot+52)+'px';t.style.transition='bottom .2s ease';
  });
  const icons={success:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="toast-icon"><path d="M20 6 9 17l-5-5"/></svg>',error:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="toast-icon"><path d="M18 6 6 18M6 6l12 12"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="toast-icon"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>',warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="toast-icon"><path d="M12 9v4m0 4h.01M10.3 3.6 2 20h20L13.7 3.6a2 2 0 0 0-3.4 0z"/></svg>'};
  // 메시지에서 타입 자동 감지
  if(m.includes('실패')||m.includes('오류')||m.includes('틀려'))type='error';
  else if(m.includes('⚠️')||m.includes('주의'))type='warn';
  else if(m.startsWith('ℹ️')||m.includes('이미'))type='info';
  const t=document.createElement('div');
  t.className=`toast ${type!=='success'?type:''}`;
  t.style.bottom='28px';
  t.innerHTML=(icons[type]||icons.success)+`<span>${m}</span>`;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut .25s ease forwards';setTimeout(()=>t.remove(),250)},2400);
}

// ─── 색상 변환 유틸 (전역) ───
function hexToHsv(hex){
  hex=(hex||'').replace('#','');
  if(hex.length!==6)return{h:0,s:1,v:1};
  const r=parseInt(hex.slice(0,2),16)/255,g=parseInt(hex.slice(2,4),16)/255,b=parseInt(hex.slice(4,6),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h=0;
  if(d){if(max===r)h=((g-b)/d)%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=((h*60)+360)%360}
  return{h,s:max?d/max:0,v:max};
}
function hsvToHex(h,s,v){
  const f=n=>{const k=(n+h/60)%6;return v-v*s*Math.max(0,Math.min(k,4-k,1))};
  return '#'+[f(5),f(3),f(1)].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');
}

  pop.id='nf-cpicker';
  pop.style.cssText=`position:fixed;z-index:9999;background:var(--card);border:1px solid var(--line2);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.18);padding:14px;width:240px;top:${Math.min(rect.bottom+8, window.innerHeight-300)}px;left:${Math.min(rect.left, window.innerWidth-250)}px;user-select:none`;

  pop.innerHTML=`
    <canvas id="nf-cp-canvas" width="212" height="140" style="width:212px;height:140px;border-radius:10px;cursor:crosshair;display:block"></canvas>
    <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
      <canvas id="nf-cp-hue" width="180" height="16" style="width:180px;height:16px;border-radius:8px;cursor:pointer;flex:1"></canvas>
      <div id="nf-cp-preview" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--line2);flex-shrink:0"></div>
    </div>
    <div style="margin-top:8px;display:flex;align-items:center;gap:6px">
      <span style="font-size:12px;color:var(--text3)">#</span>
      <input id="nf-cp-hex" maxlength="6" style="flex:1;background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:13px;font-family:monospace;color:var(--text);outline:none" oninput="nfCpHexInput(this.value)">
      <button onclick="closeNfColorPicker(true)" style="padding:5px 12px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;border:none">확인</button>
    </div>`;

  document.body.appendChild(pop);

  // State
  let hue=0, sat=1, val=1, cpDragging=false, hueDragging=false;

  // Parse current color
  const parsed=hexToHsv(nfColor);
  hue=parsed.h; sat=parsed.s; val=parsed.v;

  // Draw spectrum canvas
  const cv=document.getElementById('nf-cp-canvas');
  const ctx=cv.getContext('2d');
  function drawSpectrum(){
    const W=cv.width,H=cv.height;
    const hGrad=ctx.createLinearGradient(0,0,W,0);
    hGrad.addColorStop(0,'#fff');
    hGrad.addColorStop(1,`hsl(${hue},100%,50%)`);
    ctx.fillStyle=hGrad; ctx.fillRect(0,0,W,H);
    const vGrad=ctx.createLinearGradient(0,0,0,H);
    vGrad.addColorStop(0,'rgba(0,0,0,0)');
    vGrad.addColorStop(1,'#000');
    ctx.fillStyle=vGrad; ctx.fillRect(0,0,W,H);
    // cursor
    const cx=sat*W, cy=(1-val)*H;
    ctx.beginPath(); ctx.arc(cx,cy,7,0,Math.PI*2);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Draw hue slider
  const hc=document.getElementById('nf-cp-hue');
  const hctx=hc.getContext('2d');
  function drawHue(){
    const grad=hctx.createLinearGradient(0,0,hc.width,0);
    for(let i=0;i<=6;i++)grad.addColorStop(i/6,`hsl(${i*60},100%,50%)`);
    hctx.fillStyle=grad; hctx.fillRect(0,0,hc.width,hc.height);
  }

  function updatePreview(){
    const hex=hsvToHex(hue,sat,val);
    document.getElementById('nf-cp-preview').style.background=hex;
    const hi=document.getElementById('nf-cp-hex');
    if(hi&&document.activeElement!==hi)hi.value=hex.replace('#','');
  }

  drawSpectrum(); drawHue(); updatePreview();

  // Spectrum mouse events
  function pickSpectrum(e){
    const r=cv.getBoundingClientRect();
    sat=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    val=Math.max(0,Math.min(1,1-(e.clientY-r.top)/r.height));
    drawSpectrum(); updatePreview();
  }
  cv.onmousedown=e=>{cpDragging=true;pickSpectrum(e);e.preventDefault()};
  cv.ontouchstart=e=>{cpDragging=true;pickSpectrum(e.touches[0]);e.preventDefault()};

  // Hue slider
  function pickHue(e){
    const r=hc.getBoundingClientRect();
    hue=Math.max(0,Math.min(360,((e.clientX-r.left)/r.width)*360));
    drawSpectrum(); updatePreview();
  }
  hc.onmousedown=e=>{hueDragging=true;pickHue(e);e.preventDefault()};
  hc.ontouchstart=e=>{hueDragging=true;pickHue(e.touches[0]);e.preventDefault()};

  document.addEventListener('mousemove',function onMove(e){
    if(cpDragging)pickSpectrum(e);
    else if(hueDragging)pickHue(e);
  });
  document.addEventListener('mouseup',function onUp(){cpDragging=false;hueDragging=false});
  document.addEventListener('touchmove',function onTM(e){
    if(cpDragging)pickSpectrum(e.touches[0]);
    else if(hueDragging)pickHue(e.touches[0]);
    e.preventDefault();
  },{passive:false});
  document.addEventListener('touchend',function onTE(){cpDragging=false;hueDragging=false});

  // Hex input handler
  window.nfCpHexInput=function(v){
    if(v.length===6){const p=hexToHsv(v);hue=p.h;sat=p.s;val=p.v;drawSpectrum();updatePreview();}
  };

  let _cpOutsideClick=null;

  window.closeNfColorPicker=function(apply){
    if(apply){const hex=hsvToHex(hue,sat,val);pickNfColor(hex);}
    pop.remove();
    if(_cpOutsideClick)document.removeEventListener('mousedown',_cpOutsideClick);
  };

  // Close on outside click
  setTimeout(()=>{
    _cpOutsideClick=function(e){if(!pop.contains(e.target)&&e.target!==swatch){closeNfColorPicker(false)}};
    document.addEventListener('mousedown',_cpOutsideClick);
  },100);
}

function openFsColorPicker(){
  if(document.getElementById('fs-cpicker'))return;
  const swatch=document.getElementById('fs-color-preview');
  const rect=swatch.getBoundingClientRect();
  const pop=document.createElement('div');pop.id='fs-cpicker';
  pop.style.cssText=`position:fixed;z-index:9999;background:var(--card);border:1px solid var(--line2);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.2);padding:14px;width:240px;top:${Math.min(rect.bottom+8,window.innerHeight-300)}px;left:${Math.min(rect.left,window.innerWidth-250)}px`;
  pop.innerHTML=`<canvas id="fs-cp-c" width="212" height="140" style="width:212px;height:140px;border-radius:10px;cursor:crosshair;display:block"></canvas>
    <canvas id="fs-hue" width="212" height="16" style="width:212px;height:16px;border-radius:8px;cursor:pointer;display:block;margin-top:10px"></canvas>
    <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
      <div id="fs-cp-prev" style="width:32px;height:32px;border-radius:8px;flex-shrink:0;border:2px solid var(--line2)"></div>
      <input id="fs-cp-hex" class="inp" style="flex:1;font-size:13px;padding:6px 10px" placeholder="#HEX" maxlength="7">
      <button class="btn btn-primary" style="padding:6px 12px;font-size:13px" onclick="window._closeFsCP?.(true)">적용</button>
    </div>`;
  document.body.appendChild(pop);
  let H=220,S2=0.7,V=0.9;
  const cur=document.getElementById('fs-color').value;
  if(cur){try{const p=hexToHsv(cur.replace('#',''));if(p){H=p.h;S2=p.s;V=p.v}}catch(e){}}
  function drawS(){
    const c=document.getElementById('fs-cp-c');if(!c)return;const ctx=c.getContext('2d');
    const g1=ctx.createLinearGradient(0,0,212,0);g1.addColorStop(0,'#fff');g1.addColorStop(1,`hsl(${H},100%,50%)`);
    ctx.fillStyle=g1;ctx.fillRect(0,0,212,140);
    const g2=ctx.createLinearGradient(0,0,0,140);g2.addColorStop(0,'rgba(0,0,0,0)');g2.addColorStop(1,'#000');
    ctx.fillStyle=g2;ctx.fillRect(0,0,212,140);
    ctx.beginPath();ctx.arc(S2*212,(1-V)*140,7,0,2*Math.PI);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  }
  function drawH(){
    const c=document.getElementById('fs-hue');if(!c)return;const ctx=c.getContext('2d');
    const g=ctx.createLinearGradient(0,0,212,0);
    for(let i=0;i<=360;i+=30)g.addColorStop(i/360,`hsl(${i},100%,50%)`);
    ctx.fillStyle=g;ctx.fillRect(0,0,212,16);
    ctx.beginPath();ctx.arc(H/360*212,8,7,0,2*Math.PI);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  }
  function upd(){const hex=hsvToHex(H,S2,V);const p=document.getElementById('fs-cp-prev');if(p)p.style.background=hex;const h=document.getElementById('fs-cp-hex');if(h)h.value=hex;}
  drawS();drawH();upd();
  document.getElementById('fs-cp-c')?.addEventListener('mousedown',function(e){
    function mv(e){const r=this.getBoundingClientRect();S2=Math.max(0,Math.min(1,(e.clientX-r.left)/212));V=Math.max(0,Math.min(1,1-(e.clientY-r.top)/140));drawS();upd();}
    mv.call(this,e);const fn=mv.bind(this);document.addEventListener('mousemove',fn);document.addEventListener('mouseup',()=>document.removeEventListener('mousemove',fn),{once:true});
  });
  document.getElementById('fs-hue')?.addEventListener('mousedown',function(e){
    function mv(e){const r=this.getBoundingClientRect();H=Math.round(Math.max(0,Math.min(360,(e.clientX-r.left)/212*360)));drawS();drawH();upd();}
    mv.call(this,e);const fn=mv.bind(this);document.addEventListener('mousemove',fn);document.addEventListener('mouseup',()=>document.removeEventListener('mousemove',fn),{once:true});
  });
  document.getElementById('fs-cp-hex')?.addEventListener('input',function(){
    if(this.value.length===7){try{const p=hexToHsv(this.value.replace('#',''));if(p){H=p.h;S2=p.s;V=p.v;drawS();drawH();upd();}}catch(e){}}
  });
  window._closeFsCP=function(apply){
    if(apply){const hex=hsvToHex(H,S2,V);document.getElementById('fs-color').value=hex;document.getElementById('fs-color-preview').style.background=hex;document.querySelectorAll('.cswatch').forEach(s=>s.style.outline='2px solid transparent');}
    pop.remove();document.removeEventListener('mousedown',_out);
    window._closeFsCP=null;
  };
  function _out(e){if(!pop.contains(e.target)&&e.target!==swatch)window._closeFsCP?.(false);}
  setTimeout(()=>document.addEventListener('mousedown',_out),100);
}

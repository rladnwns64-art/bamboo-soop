  const items=[
    ['home','feed',ic('home','sm'),'홈'],
    ['home','photos',ic('image','sm'),'사진'],
    ['home','friends',ic('users','sm'),'친구'],
    ['home','dms',ic('msgCircle','sm'),'메시지'],
    ['home','bookmarks',ic('bookmark','sm'),'저장됨'],
  ];
  const menu=items.map(([v,sv,icon,label])=>{
    const on=S.view===v&&S.subview===sv;
    return `<div class="home-item ${on?'on':''}" onclick="goSub('${v}','${sv}')">${icon}${label}${sv==='friends'&&S.friendReqs.length?`<span style="margin-left:auto;background:var(--like);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px">${S.friendReqs.length}</span>`:''}</div>`;
  }).join('');
  // DM 목록
  const dmPeople=[...new Set(S.dms.map(d=>d.from_nick===S.me?d.to_nick:d.from_nick).filter(Boolean))];
  const dmList=dmPeople.map(n=>{
    const u=S.users[n];const on=S.subview==='dm'&&S.dmTarget===n;
    const hasActivity=S.posts.some(p=>p.author===n);
    return `<div class="dm-item ${on?'on':''}" onclick="openDM('${n}')"><div style="position:relative;width:30px;height:30px;flex-shrink:0"><div class="av sm"><img src="${avatarOf(n)}"></div><div class="status-ring ${hasActivity?'online':'offline'}" style="position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg)"></div></div><div class="nm">${esc(n)}</div></div>`;
  }).join('');
  const userBar=S.me?`<div class="side-user"><div class="av" onclick="goProfile('${S.me}')"><img src="${avatarOf(S.me)}"></div><div class="info"><div class="nm">${esc(S.me)}</div><div class="st" style="display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,0.3)"></span>온라인</div></div><div class="acts"><button onclick="toggleTheme()" title="테마 전환">${ic(S.theme==='dark'?'sun':'moon','sm')}</button><button onclick="openSettings()" title="설정">${ic('settings','sm')}</button></div></div>`:`<div class="side-user" style="justify-content:flex-end"><div class="acts"><button onclick="toggleTheme()" title="테마">${ic(S.theme==="dark"?"sun":"moon","sm")}</button></div></div>`;
  return `<div class="side"><div class="side-head"><h2>대나무숲</h2><div class="side-head-btn" onclick="go('home','search')">${ic('search','sm')}</div></div><div class="side-body">${menu}${dmPeople.length?'<div style="padding:10px 8px 4px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase">메시지</div>'+dmList:''}</div>${userBar}</div>`;
}
function sideForest(){
  const f=S.forests[S.forest];if(!f)return sideHome();
  const chs=f.channels||[];
  const postChs=chs.filter(c=>c.type==='post');
  const chatChs=chs.filter(c=>c.type==='chat');
  const isOwner=f.owner===S.me;
  const chItem=c=>{const on=S.channel===c.id;const icon=c.type==='chat'?ic('volume','sm'):ic('hash','sm');return `<div class="ch-item ${on?'on':''}" onclick="goChannel(${c.id})">${icon}<span style="flex:1">${esc(c.name)}</span><span class="ch-actions">${canManage?`<span class="ch-act-btn" title="설정" onclick="event.stopPropagation();openChannelPerms(${c.id})">${ic('settings','xs')}</span>`:''}</span></div>`};
  const addChBtn=S.me?`<div class="ch-item" onclick="openAddChannel('${f.id}')" style="color:var(--text3)">${ic('plus','sm')}채널 추가</div>`:'';
  const emptyMsg=!chs.length?`<div style="padding:16px 12px;font-size:13px;color:var(--text3);text-align:center">아직 채널이 없어요<br>아래에서 추가해보세요!</div>`:'';
  const userBar=S.me?`<div class="side-user"><div class="av" onclick="goProfile('${S.me}')"><img src="${avatarOf(S.me)}"></div><div class="info"><div class="nm">${esc(S.me)}</div><div class="st" style="display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,0.3)"></span>온라인</div></div><div class="acts"><button onclick="toggleTheme()">${ic(S.theme==='dark'?'sun':'moon','sm')}</button><button onclick="openSettings()">${ic('settings','sm')}</button></div></div>`:`<div class="side-user" style="justify-content:flex-end"><div class="acts"><button onclick="toggleTheme()" title="테마">${ic(S.theme==="dark"?"sun":"moon","sm")}</button></div></div>`;
  const sectionHead=(label,icon)=>`<div class="ch-section-head" onclick="this.nextElementSibling.classList.toggle('hidden');this.querySelector('.ch-section-toggle').classList.toggle('collapsed')" style="cursor:pointer">${icon||''}<span style="flex:1">${label}</span><span class="ch-section-toggle">${ic('chevDown','xs')}</span></div>`;
  const myRole=(S.memberRoles[f.id]||{})[S.me];const canManage=f.owner===S.me||myRole==='mod'||myRole==='admin';
  return `<div class="side"><div class="side-head"><h2 style="cursor:pointer;display:flex;align-items:center;gap:6px" onclick="goForest('${f.id}')">${f.icon?`<img src="${f.icon}" style="width:20px;height:20px;border-radius:6px;object-fit:cover">`:`<span>${f.emoji}</span>`} ${esc(f.name)} ${ic('chevDown','xs')}</h2><div style="display:flex;gap:2px">${canManage?`<div class="side-head-btn" onclick="openForestEditModal('${f.id}')" title="숲 설정">${ic('settings','sm')}</div>`:''}</div></div><div class="side-body">${emptyMsg}${postChs.length?sectionHead('게시판')+'<div>'+postChs.map(chItem).join('')+'</div>':''}${chatChs.length?sectionHead('채팅')+'<div>'+chatChs.map(chItem).join('')+'</div>':''}${addChBtn}</div>${userBar}</div>`;
}

function main(){
  let head='',body='';
  if(!S.forest){
    // 홈 뷰
    if(S.subview==='feed'){head=mainHead('홈','추천 피드');body=homeFeed()}
    else if(S.subview==='photos'){head=mainHead('사진','올라온 사진 모아보기');body=photosView()}
    else if(S.subview==='friends'){head=mainHead('친구','내 친구 목록');body=friendsView()}
    else if(S.subview==='dms'){head=mainHead('메시지','');body=`<div class="empty">${ic('msgCircle')}<h3>왼쪽에서 대화를 선택하세요</h3></div>`}
    else if(S.subview==='dm'){head=mainHead(S.dmTarget||'메시지','');body=dmView()}
    else if(S.subview==='bookmarks'){head=mainHead('저장됨','북마크한 글');body=bookmarksView()}
    else if(S.subview==='search'){head=mainHead('검색','');body=searchView()}
    else if(S.subview==='profile'){head=mainHead(S.target||'프로필','',true);body=profileView()}
    else if(S.subview==='detail'){head=mainHead('게시글','',true);body=detailView()}
    else if(S.subview==='findforest'){head=mainHead('숲 탐색','');body=findForestView()}
    else{head=mainHead('홈','');body=homeFeed()}
  }else{
    // 숲 뷰
    const ch=S.channels[S.channel];
    if(!ch){head=mainHead('채널 선택','');body=`<div class="empty">${ic('hash')}<h3>채널을 선택하세요</h3></div>`}
    else if(ch.type==='chat'){head=mainHead('#'+ch.name,ch.description||'');body=chatView(ch)}
    else{head=mainHead('#'+ch.name,ch.description||'');body=channelFeed(ch)}
    if(S.subview==='detail'){head=mainHead('게시글','',true);body=detailView()}
    if(S.subview==='profile'){head=mainHead(S.target||'프로필','',true);body=profileView()}
  }
  return `<div class="main">${head}<div class="main-body">${body}</div></div>`;
}
function mainHead(title,desc,hasBack){
  const icon=S.forest?'hash':'home';
  const profBtn=S.me
    ?`<div class="main-head-btn" onclick="goProfile('${S.me}')" style="border-radius:50%;overflow:hidden;padding:0;width:30px;height:30px"><img src="${avatarOf(S.me)}" style="width:100%;height:100%;object-fit:cover"></div>`
    :`<button class="main-head-btn" onclick="openAuth()">${ic('user','sm')}</button>`;
  // 채팅 채널일 때 추가 버튼
  const ch=S.channel?S.channels[S.channel]:null;
  const isChatCh=ch&&ch.type==='chat';
  const totalUnread=S.unreadNotifCount+S.friendReqs.length;
  const notifBtn=`<button class="main-head-btn ${S._notifOpen?'active':''}" title="알림" onclick="toggleNotifPanel()" style="position:relative">${totalUnread&&!S._notifOpen?`<span class="notif-badge">${totalUnread>9?'9+':totalUnread}</span>`:''}${ic('bell','sm')}</button>`;
  const searchBtn=`<button class="main-head-btn" onclick="go('home','search')" title="검색">${ic('search','sm')}</button>`;
  const forestBtns=S.forest
    ?`<button class="main-head-btn ${S._pinOpen?'active':''}" title="핀 메시지" onclick="togglePinPanel()">${ic('pin','sm')}</button><button class="main-head-btn ${_showMemberPanel?'active':''}" title="멤버 목록" onclick="toggleMemberPanel()">${ic('users','sm')}</button>${notifBtn}`
    :notifBtn;
  return `<div class="main-head">${hasBack?`<button class="main-head-btn" onclick="goBack()">${ic('back','sm')}</button>`:''}<div class="title"><span style="display:inline-flex;align-items:center">${ic(icon,'sm')}</span><span>${esc(title)}</span></div>${desc?`<div class="sep"></div><div class="desc">${esc(desc)}</div>`:''}<div style="flex:1"></div>${forestBtns}${searchBtn}${profBtn}</div>`;
}

// ═══ HOME VIEWS ═══
function homeFeed(){
  const ci=`<div style="margin-bottom:16px;display:flex;gap:10px;align-items:center;cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 18px" onclick="openCompose()"><div class="av sm ${S.me?'':'anon'}">${S.me?`<img src="${avatarOf(S.me)}">`:`${ic('user','xs')}`}</div><span style="color:var(--text3);flex:1">무슨 생각을 하고 있나요?</span><span class="btn btn-primary btn-sm">${ic('edit','xs')} 글쓰기</span></div>`;
  // 트렌딩 태그
  const trending=getTrendingTags();
  const trendHtml=trending.length?`<div class="trending-section"><h3>🏷️ 트렌딩 태그</h3><div class="tag-cloud">${trending.map(([t,c])=>`<span class="trend-tag" onclick="searchByTag('${escA(t)}')">#${esc(t)}<span class="cnt">${c}</span></span>`).join('')}</div></div>`:'';
  // 주간 인기 Top 5
  const weekly=getWeeklyTop();
  const weeklyHtml=weekly.length?`<div class="home-section"><h3>📅 이번 주 TOP 5</h3>${weekly.map((p,i)=>{
    const nick=p.author||p.anon_nick||'익명';const f=S.forests[p.forest_id];
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span style="font-size:14px;font-weight:800;color:var(--text3)">${i+1}</span>`;
    return `<div class="pcard" onclick="openDetail(${p.id})" style="display:flex;gap:12px;align-items:center;padding:12px 16px">
      <div style="width:28px;text-align:center;flex-shrink:0;font-size:20px">${medal}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.title||plainText(p.content).slice(0,40))}</div>
        <div style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px">${esc(nick)} ${getLvBadge(p.author)}<span>${f?'· '+esc(f.name):''}</span><span style="display:inline-flex;align-items:center;gap:2px">${ic('heart','xs')} ${S.likeCounts[p.id]||0}</span><span style="display:inline-flex;align-items:center;gap:2px">${ic('comment','xs')} ${p.comments.length}</span><span style="display:inline-flex;align-items:center;gap:2px">${ic('eye','xs')} ${p.views||0}</span></div>
      </div>
    </div>`;
  }).join('')}</div>`:'';
  const popular=S.posts.filter(p=>{
    const ch=S.channels[p.channel_id];
    if(ch&&ch.type==='chat')return false;
    if((p.title||'').startsWith('reply:'))return false;
    return true;
  }).sort((a,b)=>((S.likeCounts[b.id]||0)+b.comments.length)-((S.likeCounts[a.id]||0)+a.comments.length)).slice(0,6);
  const recForests=Object.values(S.forests).filter(f=>!S.myForests.has(f.id)).slice(0,4);
  const recUsers=Object.values(S.users).filter(u=>u.nick!==S.me).sort((a,b)=>b.posts-a.posts).slice(0,6);
  const _icFire=`<span style="font-size:15px;line-height:1">🔥</span>`;
  const _icForest=`<span style="font-size:15px;line-height:1">🎋</span>`;
  const _icUsers=`<span style="font-size:15px;line-height:1">👥</span>`;
  const _icPhoto=`<span style="font-size:15px;line-height:1">🖼️</span>`;

function findForestView(){
  const forests=Object.values(S.forests);
  const categories=['전체','게임','창작','스터디','일상','잡담','기타'];
  const _cat=window._findCat||'전체';
  const _q=window._findQ||'';
  const filtered=forests.filter(f=>{
    const matchCat=_cat==='전체'||f.name.includes(_cat)||f.description?.includes(_cat)||f.emoji===({'게임':'🎮','창작':'🎨','스터디':'📚','일상':'🌿','잡담':'💬'}[_cat]||'');
    const matchQ=!_q||f.name.toLowerCase().includes(_q.toLowerCase())||f.description?.toLowerCase().includes(_q.toLowerCase());

// ═══ POST CARD ═══
function pcard(p){
  if(!p)return'';
  const nick=p.author||p.anon_nick||'익명';
  const liked=S.likes.has(p.id);
  const bookmarked=S.bookmarks.has(p.id);
  const likeCnt=S.likeCounts[p.id]||0;
  const cmtCnt=(p.comments||[]).length;
  const f=S.forests[p.forest_id];
  const ch=S.channels[p.channel_id];

  // 아바타
  const avHtml=p.author
    ?`<div class="av" onclick="event.stopPropagation();goProfile('${p.author}')"><img src="${avatarOf(p.author)}"></div>`
    :`<div class="av anon">${ic('user','sm')}</div>`;

  // 핀 배지
  const pinBadge=p.pinned?`<span style="font-size:10px;background:var(--gold);color:#fff;padding:2px 7px;border-radius:6px;font-weight:700;margin-left:6px">${ic('pin','xs')} 고정</span>`:'';

  // 숲·채널 태그
  const forestTag=f?`<span style="font-size:11px;color:var(--text3)">${f.emoji} ${esc(f.name)}${ch?' · #'+esc(ch.name):''}</span>`:'';

  // 이미지 썸네일
  let imgs=p.imgs||[];
  if(typeof imgs==='string'){try{imgs=JSON.parse(imgs)}catch(e){imgs=[]}}
  if(!Array.isArray(imgs))imgs=[];
  const imgHtml=imgs.length
    ?`<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">${imgs.slice(0,4).map((img,i)=>`<img src="${img}" onclick="event.stopPropagation();viewImg('${img}')" style="width:${imgs.length===1?'100%':'calc(50% - 3px)'};max-height:${imgs.length===1?'280px':'140px'};object-fit:cover;border-radius:10px;cursor:pointer;display:block"${i===3&&imgs.length>4?` data-extra="+${imgs.length-4}"`:''}>`).join('')}</div>`
    :'';

  // 파일 첨부
  let files=p.files||[];
  if(typeof files==='string'){try{files=JSON.parse(files)}catch(e){files=[]}}
  if(!Array.isArray(files))files=[];
  const _isImg=n=>/\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(n||'');
  const fileHtml=files.length
    ?`<div class="pcard-files">${files.map(f2=>_isImg(f2.name)&&f2.data
      ?`<img src="${esc(f2.data)}" onclick="event.stopPropagation();viewImg('${esc(f2.data)}')" style="max-width:100%;max-height:220px;border-radius:10px;cursor:pointer;object-fit:cover">`
      :`<div class="pcard-file" onclick="event.stopPropagation();downloadFile('${esc(f2.name)}','${esc(f2.data||'')}')">${ic('file','xs')} ${esc(f2.name)}</div>`).join('')}</div>`
    :'';


  // 태그
  let tags=p.tags||[];
  if(typeof tags==='string'){try{tags=JSON.parse(tags)}catch(e){tags=[]}}
  if(!Array.isArray(tags))tags=[];
  const tagHtml=tags.length
    ?`<div class="pcard-tags">${tags.map(t=>`<span class="tag" onclick="event.stopPropagation();searchByTag('${escA(t)}')">#${esc(t)}</span>`).join('')}</div>`
    :'';

  // 투표
  const pollHtml=p.poll?renderPoll(p):'';

  // 반응
  const rxmap=S.reactions[p.id]||{};
  const rxHtml=Object.entries(rxmap).map(([em,cnt])=>`<span class="rx-chip ${S.myReactions.has(p.id+'|'+em)?'my':''}" onclick="event.stopPropagation();toggleReaction(${p.id},'${em}')">${em} ${cnt}</span>`).join('');
  const rxRow=rxHtml?`<div class="rx-row" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">${rxHtml}</div>`:'';

  // 비공개 배지
  const visBadge=p.visibility==='private'?`<span style="font-size:10px;background:var(--card3);color:var(--text3);padding:2px 6px;border-radius:6px;margin-left:4px">${ic('lock','xs')} 비공개</span>`
    :p.visibility==='followers'?`<span style="font-size:10px;background:var(--card3);color:var(--text3);padding:2px 6px;border-radius:6px;margin-left:4px">${ic('users','xs')} 팔로워</span>`:'';

  return `<div class="pcard" onclick="openDetail(${p.id})">
    <div class="pcard-top">
      ${avHtml}
      <div class="pcard-who">
        <div class="pcard-name">${esc(nick)} ${p.author?getLvBadge(p.author):''}${visBadge}${pinBadge}</div>
        <div class="pcard-time">${ago(p.created_at)}${forestTag?' · ':' '}${forestTag}</div>
      </div>
      <button onclick="event.stopPropagation();share(${p.id})" style="color:var(--text3);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">${ic('share','xs')}</button>
    </div>
    ${p.title?`<div class="pcard-title">${esc(p.title)}${cmtCnt?`<span class="cmt-cnt">[${cmtCnt}]</span>`:''}</div>`:''}
    <div class="pcard-preview">${plainText(p.content||'')}</div>
    ${imgHtml}${fileHtml}${tagHtml}${pollHtml}${rxRow}
    <div class="pcard-foot">
      <span class="act ${liked?'liked':''}" onclick="event.stopPropagation();like(${p.id})">${ic('heart','sm')}</span><span class="act" onclick="event.stopPropagation();openLikeList(${p.id})" style="padding-left:2px;min-width:20px">${likeCnt}</span>
      <span class="act" onclick="openDetail(${p.id})">${ic('comment','sm')} ${cmtCnt}</span>
      <span class="spacer"></span>
      <span style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:3px">${ic('eye','xs')} ${p.views||0}</span>
      <div style="position:relative">
        <button onclick="event.stopPropagation();toggleReactPop(${p.id})" style="font-size:16px;width:30px;height:30px;border-radius:8px;transition:.15s" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">😊</button>
        <div id="rp-${p.id}" class="react-pop hidden">
          ${['👍','❤️','😂','😮','🔥','🎉','😢','👏'].map(em=>`<button onclick="event.stopPropagation();toggleReaction(${p.id},'${em}');toggleReactPop(${p.id})">${em}</button>`).join('')}
        </div>
      </div>
      <button class="act ${bookmarked?'liked':''}" onclick="event.stopPropagation();toggleBookmark(${p.id})">${ic('bookmark',bookmarked?'sm fill':'sm')}</button>
      ${(p.author&&p.author===S.me)||((!p.author)&&p.anon_key&&p.anon_key===localStorage.getItem('anon_key'))?`<button class="btn-icon" onclick="event.stopPropagation();openEdit(${p.id})">${ic('edit','xs')}</button><button class="btn-icon danger" onclick="event.stopPropagation();if(confirm('삭제?'))delPost(${p.id})">${ic('trash','xs')}</button>`:''}
    </div>
  </div>`;
}
// ═══ CHANNEL FEED ═══
function channelFeed(ch){
  const posts=S.posts.filter(p=>p.channel_id===ch.id&&!(p.title||'').startsWith('reply:'));
  const ci=`<div style="margin-bottom:14px;display:flex;gap:10px;align-items:center;cursor:text;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 16px" onclick="openCompose()"><div class="av sm ${S.me?'':'anon'}">${S.me?`<img src="${avatarOf(S.me)}">`:`${ic('user','xs')}`}</div><span style="color:var(--text3);flex:1">이 채널에 글을 남겨보세요...</span><span class="btn btn-primary btn-sm">게시</span></div>`;
  const list=posts.length?posts.map(p=>pcard(p)).join(''):`<div class="empty">${ic('edit')}<h3>아직 글이 없어요</h3><p>첫 글을 남겨보세요!</p></div>`;
  return ci+list;
}
let chatReplyTo=null;

    const imgHtml=(m.imgs&&m.imgs.length)?`<div class="post-imgs n${Math.min(m.imgs.length,2)}" style="max-width:300px;margin-top:6px">${m.imgs.slice(0,2).map(x=>`<img src="${x}" onclick="viewImg('${x}')" style="max-height:200px">`).join('')}</div>`:'';
    return `<div class="chat-msg" id="msg-${m.id}"><div class="av sm ${m.author?'':'anon'}" onclick="${m.author?`goProfile('${m.author}')`:''}"><img src="${m.author?avatarOf(m.author):''}"></div><div class="bubble"><div class="nm"><span class="nm-nick">${esc(nick)}</span>${m.author?getLvBadge(m.author):''}<span class="time">${ago(m.created_at)}</span></div>${replyHtml}<div class="mtxt">${parseMentions(renderRich(m.content))}</div>${imgHtml}${rHtml?`<div class="msg-reactions">${rHtml}</div>`:''}</div><div class="msg-actions"><span class="msg-act" onclick="setChatReply(${m.id},'${escA(nick)}')" title="답글">↩</span><span class="msg-act" onclick="toggleMsgReactPop(event,${m.id})" title="반응">😊</span>${m.author===S.me?`<span class="msg-act" onclick="delPost(${m.id})" title="삭제">${ic('trash','xs')}</span>`:''}</div></div>`;
  }).join('');

// ═══ 멤버 패널 ═══
let _showMemberPanel=true;
function _setPanelBlur(on){
  const root=document.getElementById('root');
  if(!root)return;
  if(on)root.classList.add('panel-open');
  else root.classList.remove('panel-open');
}
function toggleMemberPanel(){
  _showMemberPanel=!_showMemberPanel;
  S._pinOpen=false;S._notifOpen=false;
  render();
}
function togglePinPanel(){
  S._pinOpen=!S._pinOpen;
  if(S._pinOpen){S._notifOpen=false;_showMemberPanel=false;}
  _setPanelBlur(S._pinOpen||S._notifOpen);
  render();
}
function toggleNotifPanel(){
  S._notifOpen=!S._notifOpen;
  if(S._notifOpen){S._pinOpen=false;_showMemberPanel=false;}
  _setPanelBlur(S._pinOpen||S._notifOpen);
  render();
}
function closeSidePanel(){
  S._pinOpen=false;S._notifOpen=false;
  _setPanelBlur(false);
  render();
}

function pinPanel(){
  if(!S._pinOpen)return '';
  const ch=S.channel?S.channels[S.channel]:null;
  // 핀된 글 = 채널의 글 중 likes 많은 상위 5개 (실제 pin 기능 없으므로 인기글로 대체)
  const pins=S.posts.filter(p=>S.channel?p.channel_id===S.channel:p.forest_id===S.forest)
    .filter(p=>{
      const ch=S.channels[p.channel_id];
      if(ch&&ch.type==='chat')return false;
      if((p.title||'').startsWith('reply:'))return false;
      return S.likeCounts[p.id]>0||(p.imgs&&p.imgs.length);
    })
    .sort((a,b)=>(S.likeCounts[b.id]||0)-(S.likeCounts[a.id]||0))
    .slice(0,8);
  const pinHtml=pins.length
    ?pins.map(p=>{
        const nick=p.author||p.anon_nick||'익명';
        const txt=p.title||plainText(p.content).slice(0,80)||'(내용 없음)';
        const imgHtml=p.imgs&&p.imgs[0]?`<img class="pin-img" src="${p.imgs[0]}">`:'';
        return `<div class="pin-item" onclick="openDetail(${p.id});closeSidePanel()">
          <div class="pin-meta">${ic('pin','xs')} <b>${esc(nick)}</b> · ${ago(p.created_at)}</div>
          <div class="pin-txt">${esc(txt)}</div>${imgHtml}
        </div>`;
      }).join('')
    :`<div class="empty" style="padding:40px 20px">${ic('pin')}<h3>핀된 메시지 없음</h3><p>인기 있는 글이 여기 표시돼요</p></div>`;
  return `<div class="slide-panel"><div class="slide-panel-head">${ic('pin','sm')}<h3>핀된 메시지</h3><div class="slide-panel-close" onclick="closeSidePanel()">${ic('x','sm')}</div></div><div class="slide-panel-body">${pinHtml}</div></div>`;
}

function notifPanel(){
  if(!S._notifOpen)return '';
  // 알림 데이터 생성 (DB + 활동 기반 통합)
  const notifs=[];
  // DB 알림
  S.notifications.forEach(n=>{
    notifs.push({type:n.type||'system',icon:n.type==='comment'?'💬':n.type==='like'?'❤️':n.type==='mention'?'@':n.type==='friend'?'👋':'🔔',txt:n.message||'알림',time:n.created_at,unread:!n.read_at,id:n.id,action:n.action_url?`go('home','detail')`:null});
  });
  // 친구 요청
  S.friendReqs.forEach(r=>{
    notifs.push({type:'friend',icon:'👋',txt:`<b>${esc(r.from_nick)}</b>님이 친구 요청을 보냈어요`,time:r.created_at,unread:true,action:`acceptFriend(${r.id})`});
  });
  // 내 글에 달린 최근 댓글
  if(S.me){
    const myPosts=S.posts.filter(p=>p.author===S.me);
    myPosts.forEach(p=>{
      (p.comments||[]).filter(c=>c.author!==S.me).slice(0,2).forEach(c=>{
        notifs.push({type:'comment',icon:'💬',txt:`<b>${esc(c.author||'익명')}</b>님이 "<b>${esc((p.title||plainText(p.content)).slice(0,20))}</b>"에 댓글을 남겼어요`,time:c.created_at,unread:false});
      });
    });
    // 내 글 좋아요 (likeCounts 기반 간이)
    myPosts.filter(p=>(S.likeCounts[p.id]||0)>0).slice(0,3).forEach(p=>{
      notifs.push({type:'like',icon:'❤️',txt:`"<b>${esc((p.title||plainText(p.content)).slice(0,20))}</b>" 글에 좋아요 <b>${S.likeCounts[p.id]}개</b>`,time:p.created_at,unread:false});
    });
  }
  notifs.sort((a,b)=>new Date(b.time)-new Date(a.time));
  const unread=notifs.filter(n=>n.unread);
  const read=notifs.filter(n=>!n.unread);
  const mkItem=n=>`<div class="notif-item ${n.unread?'unread':''}" ${n.action?`onclick="${n.action};closeSidePanel()"`:''}>
    <div class="notif-icon">${n.icon}</div>
    <div class="notif-body"><div class="ntxt">${n.txt}</div><div class="ntime">${ago(n.time)}</div></div>
  </div>`;
  const body=notifs.length
    ?`${unread.length?`<div class="notif-sep">새 알림</div>${unread.map(mkItem).join('')}`:''}
       ${read.length?`<div class="notif-sep">이전 알림</div>${read.map(mkItem).join('')}`:''}`
    :`<div class="empty" style="padding:40px 20px">${ic('bell')}<h3>알림이 없어요</h3><p>활동이 생기면 여기에 표시돼요</p></div>`;
  const unreadCnt=notifs.filter(n=>n.unread).length;
  return `<div class="slide-panel"><div class="slide-panel-head">${ic('bell','sm')}<h3>알림</h3>${unreadCnt?`<span style="background:var(--like);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px">${unreadCnt}</span>`:''}<div style="flex:1"></div>${unreadCnt?`<button style="font-size:12px;color:var(--accent);font-weight:600;padding:4px 8px" onclick="markAllNotifRead()">모두 읽음</button>`:''}<div class="slide-panel-close" onclick="closeSidePanel()">${ic('x','sm')}</div></div><div class="slide-panel-body">${body}</div></div>`;
}
function memberPanel(){
  if(!S.forest||!_showMemberPanel)return '';
  const f=S.forests[S.forest];if(!f)return '';
  // 멤버 데이터 (profiles에서 가져온 users + 실제 forest_members)
  const allNicks=Object.keys(S.users);
  // 온라인 = 최근 활동한 유저들 (간이: posts가 있거나 me)
  const active=_onlineUsers.size>0?_onlineUsers:new Set([...S.posts.filter(p=>p.forest_id===S.forest).map(p=>p.author).filter(Boolean)]);
  if(S.me)active.add(S.me);
  const online=allNicks.filter(n=>active.has(n));
  const offline=allNicks.filter(n=>!active.has(n)).slice(0,8);
  const memItem=(nick,isOnline)=>{
    const u=S.users[nick];
    const statusClass=isOnline?(nick===S.me?'online':'idle'):'offline';
    const statusText=nick===S.me?'온라인':(isOnline?'활동 중':'오프라인');
    const role=(S.memberRoles[S.forest]||{})[nick];

async function searchGif(q){
  _gifQuery=q;
  const grid=document.getElementById('gif-grid');if(!grid)return;
  grid.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text3)">🔍 로딩 중...</div>`;
  try{
    const isTrending=!q||q==='trending'||q==='🔥인기';
    // Tenor v1 - API 키 불필요
    const url=isTrending
      ?`https://api.tenor.com/v1/trending?key=LIVDSRZULELA&limit=20&media_filter=minimal&contentfilter=medium&locale=ko_KR`
      :`https://api.tenor.com/v1/search?key=LIVDSRZULELA&q=${encodeURIComponent(q)}&limit=20&media_filter=minimal&contentfilter=medium&locale=ko_KR`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const results=data.results||[];
    if(!results.length){
      grid.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text3)">😢 결과가 없어요</div>`;
      return;
    }
    grid.innerHTML=results.map(r=>{
      const media=r.media?.[0];
      const gifUrl=media?.tinygif?.url||media?.gif?.url||'';
      if(!gifUrl)return '';
      const safe=gifUrl.replace(/'/g,'%27');
      // 각 GIF가 자연스러운 비율로 표시되도록 (masonry 효과)
      return `<div onclick="sendGif('${safe}')" style="cursor:pointer;border-radius:10px;overflow:hidden;background:var(--card2);transition:transform .15s,opacity .15s;margin-bottom:6px;break-inside:avoid;display:block" onmouseover="this.style.transform='scale(1.03)';this.style.opacity='0.9'" onmouseout="this.style.transform='';this.style.opacity='1'"><img src="${gifUrl}" style="width:100%;display:block;border-radius:10px" loading="lazy"></div>`;
    }).join('');
  }catch(e){
    console.error('GIF 에러:',e);
    grid.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text3)">😥 불러오기 실패<br><small>${e.message}</small></div>`;
  }
}

// ─── Supabase Storage 업로드 공통 함수 ───
async function uploadToStorage(file, bucket, path){
  const compressed=await compressImage(file, bucket==='avatars'?400:1200, 0.82);
  const {data,error}=await sb.storage.from(bucket).upload(path,compressed,{contentType:'image/jpeg',upsert:true});
  if(error)throw error;
  const {data:{publicUrl}}=sb.storage.from(bucket).getPublicUrl(path);
  return publicUrl;
}
function compressImage(file,maxPx,quality){
  return new Promise((res,rej)=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx}else{w=Math.round(w*maxPx/h);h=maxPx}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>{URL.revokeObjectURL(url);res(b)},'image/jpeg',quality);
    };img.onerror=rej;img.src=url;
  });
}

    _rtChannel=sb.channel('public-changes')
      .on('postgres_changes',{event:'*',schema:'public'},()=>{loadAll()})
      .subscribe();
    // Presence: 로그인 유저만 트래킹
    if(S.me){
      const presenceCh=sb.channel('presence-room');
      presenceCh
        .on('presence',{event:'sync'},()=>{
          const state=presenceCh.presenceState();
          _onlineUsers=new Set(Object.values(state).flat().map(p=>p.nick).filter(Boolean));
          render();
        })
        .subscribe(async status=>{
          if(status==='SUBSCRIBED'){
            await presenceCh.track({nick:S.me,online_at:new Date().toISOString()});
          }
        });
    }
  }catch(e){console.warn('Realtime 초기화 실패:',e);}
}

function getLvBadge(nick){
  if(!nick)return'';
  const u=S.users[nick];
  const posts=(u&&u.posts)||0;
  let lv,color,label;
  if(posts>=100){lv=5;color='#f59e0b';label='🏆 전설'}
  else if(posts>=50){lv=4;color='#8b5cf6';label='💎 다이아'}
  else if(posts>=20){lv=3;color='#4a6cf7';label='🥇 골드'}
  else if(posts>=5){lv=2;color='#22c55e';label='🥈 실버'}
  else{return''}
  return '<span style="font-size:10px;font-weight:700;color:'+color+';background:'+color+'18;padding:1px 6px;border-radius:8px;margin-left:3px">'+label+'</span>';
}
function drawPreview(){
  const el=document.getElementById('c-preview');if(!el)return;
  el.innerHTML=pImgs.map((item,i)=>{
    const url=typeof item==='string'?item:item.url;
    return `<div style="position:relative;display:inline-block;margin:4px"><img src="${url}" style="width:80px;height:80px;object-fit:cover;border-radius:8px"><button onclick="pImgs.splice(${i},1);drawPreview()" style="position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center">×</button></div>`;
  }).join('');
}
async function submitPost(){
  const ed=document.getElementById('editor');
  const title=document.getElementById('c-title')?.value.trim()||'';
  const content=ed?ed.innerHTML:'';
  const tags=(document.getElementById('c-tags')?.value||'').split(',').map(t=>t.trim()).filter(Boolean);
  const forestId=composeForestId==='free'?null:composeForestId;
  const channelId=composeChId;
  const forceAnon=S.composeAnon||!S.me;
  if(!title&&!plainText(content)){toast('내용을 입력하세요');return}
  // 이미지 Storage 업로드
  let uploadedImgs=[];
  if(pImgs.length){
    toast('이미지 업로드 중...','info');
    uploadedImgs=await uploadPostImages();
  }
  const aKey=(!S.me||forceAnon)?(localStorage.getItem('anon_key')||(()=>{const k='ak_'+Math.random().toString(36).slice(2);localStorage.setItem('anon_key',k);return k})()):'';
  // 기본 컬럼만 (DB에 없는 컬럼 제외)
  const row={channel_id:channelId,forest_id:forestId,author:forceAnon?null:S.me,anon_nick:(forceAnon||!S.me)?anonNick():null,anon_key:aKey||null,title,content,tags,imgs:uploadedImgs};
  // 선택 컬럼 — DB에 있으면 추가
  try{const testCols={};if(pFiles.length)testCols.files=JSON.stringify(pFiles.map(f=>({name:f.name})));if(S._postVisibility&&S._postVisibility!=='public')testCols.visibility=S._postVisibility;if(S._composePoll?.question&&S._composePoll.options.filter(Boolean).length>=2)testCols.poll=JSON.stringify({question:S._composePoll.question,options:S._composePoll.options.filter(Boolean)});if(S._scheduleTime)testCols.scheduled_at=new Date(S._scheduleTime).toISOString();Object.assign(row,testCols)}catch(e){}
  closeM();
  try{
    const {error}=await sb.from('posts').insert(row);
    if(error)throw error;
    pImgs=[];pFiles=[];
    toast(S._scheduleTime?`예약 게시됨`:'게시됐어요!');
    S._scheduleTime=null;S._composePoll=null;
    await loadAll();
  }catch(e){console.error(e);toast('게시 실패: '+e.message)}
}
function pickFile(inp){
  for(const f of inp.files){
    pFiles.push(f);
    if(/\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(f.name)){
      const reader=new FileReader();
      reader.onload=e=>{pImgs.push({url:e.target.result,name:f.name});drawPreview()};
      reader.readAsDataURL(f);
    }
  }
  drawFilePreview();
}
function drawFilePreview(){
  let el=document.getElementById('c-file-preview');
  if(!el){const pp=document.getElementById('c-preview');if(!pp)return;el=document.createElement('div');el.id='c-file-preview';el.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-top:6px';pp.after(el)}
  const nonImg=pFiles.filter(f=>!/\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(f.name));
  el.innerHTML=nonImg.map((f,i)=>`<div style="display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;background:var(--card2);border:1px solid var(--line);font-size:12px">${ic('file','xs')} ${f.name.length>20?f.name.slice(0,17)+'...':f.name}<button onclick="pFiles.splice(${i},1);drawFilePreview()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px">×</button></div>`).join('');
}

async function saveForest(id){

      toast('아이콘 업로드 중...','info');

async function createForest(){

  if(!S.me){toast('로그인 필요');openAuth();return}
  try{
    let iconUrl=newForestIcon,bannerUrl=newForestBanner;
    if(newForestIcon instanceof File){toast('아이콘 업로드 중...','info');iconUrl=await uploadToStorage(newForestIcon,'forests',`new_${Date.now()}/icon.jpg`);}
    if(newForestBanner instanceof File){toast('배너 업로드 중...','info');bannerUrl=await uploadToStorage(newForestBanner,'forests',`new_${Date.now()}/banner.jpg`);}
    const {data:fd,error}=await sb.from('forests').insert({name,description:document.getElementById('nf-desc')?.value.trim()||'',owner:S.me,emoji:nfEmoji,color:nfColor,icon:iconUrl||'',banner:bannerUrl||''}).select().single();

      sb.from('channels').insert({forest_id:fid,name:'일반',type:'post',position:0}),
      sb.from('channels').insert({forest_id:fid,name:'채팅',type:'chat',position:1}),

    ]);

  }catch(e){toast('실패: '+e.message)}
}

  const form=document.getElementById('auth-form');if(!form)return;
  if(tab==='login'){
    form.innerHTML=`
      <div class="mfield"><label>이메일</label><input class="inp" type="email" id="auth-email-login" placeholder="가입할 때 쓴 이메일" onkeydown="if(event.key==='Enter')doAuth('login')"></div>
      <div class="mfield"><label>닉네임</label><input class="inp" id="auth-nick" placeholder="가입할 때 만든 닉네임" maxlength="12" onkeydown="if(event.key==='Enter')doAuth('login')"></div>
      <div class="mfield"><label>비밀번호</label><input class="inp" type="password" id="auth-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doAuth('login')"></div>
      <button class="btn btn-primary btn-block" onclick="doAuth('login')">로그인</button>`;
  }else{
    form.innerHTML=`
      <div style="display:flex;gap:8px">
        <div class="mfield" style="flex:1"><label>반</label><input class="inp" id="auth-class" type="number" placeholder="1" min="1" max="6"></div>
        <div class="mfield" style="flex:1"><label>번호</label><input class="inp" id="auth-num" type="number" placeholder="1" min="1" max="40"></div>
      </div>
      <div class="mfield"><label>이름</label><input class="inp" id="auth-name" placeholder="실제 이름" maxlength="6"></div>
      <div class="mfield">
        <label>닉네임 <span style="font-size:11px;color:var(--text3)">글에 표시되는 이름</span></label>
        <input class="inp" id="auth-nick" placeholder="2~12글자" maxlength="12">
      </div>
      <div class="mfield"><label>이메일</label><input class="inp" type="email" id="auth-email" placeholder="본인 이메일 주소" maxlength="100" onkeydown="if(event.key==='Enter')doAuth('signup')"></div>
      <div class="mfield"><label>비밀번호</label><input class="inp" type="password" id="auth-pw" placeholder="6자 이상" onkeydown="if(event.key==='Enter')doAuth('signup')"></div>
      <button class="btn btn-primary btn-block" onclick="doAuth('signup')">가입하기</button>`;
  }
  setTimeout(()=>document.getElementById('auth-nick')?.focus(),50);
}

async function doAuth(type){
  const nick=document.getElementById('auth-nick')?.value.trim();
  const pw=document.getElementById('auth-pw')?.value||'';

  if(type==='login'){
    if(!nick||!pw){toast('닉네임과 비밀번호를 입력하세요');return}
    const emailInput=document.getElementById('auth-email-login')?.value.trim();
    if(!emailInput){toast('이메일을 입력하세요');return}
    const {error}=await sb.auth.signInWithPassword({email:emailInput,password:pw});
    if(error){toast('이메일, 닉네임 또는 비밀번호가 틀렸어요');return}
    S.me=nick;localStorage.setItem('me',nick);
    closeM();toast(`반가워요, ${nick}! 🎋`);await loadAll();checkTutorial();

  }else{
    const classN=parseInt(document.getElementById('auth-class')?.value||'0');
    const numN=parseInt(document.getElementById('auth-num')?.value||'0');
    const name=document.getElementById('auth-name')?.value.trim();
    const email=(document.getElementById('auth-email')?.value.trim()||'');
    if(!classN||!numN||!name||!nick||!email||!pw){toast('모든 항목을 입력하세요');return}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('이메일 형식이 올바르지 않아요');return}
    if(pw.length<6){toast('비밀번호는 6자 이상이에요');return}
    if(nick.length<2){toast('닉네임은 2글자 이상이에요');return}
    if(classN<1||classN>6||numN<1||numN>40){toast('반/번호를 확인하세요');return}

    // 닉네임 중복
    const {data:nickCheck}=await sb.from('profiles').select('nick').eq('nick',nick).maybeSingle();
    if(nickCheck){toast('이미 사용 중인 닉네임이에요');return}

    // 반+번호+이름 중복
    const {data:dupCheck}=await sb.from('profiles').select('nick').eq('class_num',classN).eq('student_num',numN).eq('real_name',name).maybeSingle();
    if(dupCheck){toast('이미 가입된 정보예요. 닉네임으로 로그인하세요 👉');return}

    try{
      // Supabase Auth 계정 생성
      const {data:authData,error:authErr}=await sb.auth.signUp({email,password:pw});
      if(authErr)throw authErr;
      const uid=authData.user?.id;
      if(!uid)throw new Error('계정 생성 실패');

      // profiles 저장 (user_id 포함)
      await sb.from('profiles').insert({
        nick,real_name:name,class_num:classN,student_num:numN,
        verified:true,bio:'',avatar:'',user_id:uid,email,
        created_at:new Date().toISOString()
      });

      S.me=nick;localStorage.setItem('me',nick);
      closeM();toast(`${classN}반 ${numN}번 ${name}님, 환영해요! 🎋`);
      S.subview='feed';S.forest=null;S.channel=null;
      await loadAll();
    }catch(e){const m=e.message||'';if(m.includes('already registered')||m.includes('already been registered'))toast('이미 사용된 이메일이에요. 다른 이메일로 가입하거나 로그인해 보세요.');else if(m.includes('invalid')||m.includes('email'))toast('이메일 형식이 올바르지 않아요.');else toast('가입 실패: '+m);}
  }
}

async function logout(){
  if(!confirm('로그아웃 할까요?'))return;
  await sb.auth.signOut();
  S.me=null;localStorage.removeItem('me');closeM();toast('로그아웃됐어요');render();
}

async function like(id){
  if(!S.me){toast('로그인이 필요해요','warn');openAuth();return}
  const liked=S.likes.has(id);
  if(liked){S.likes.delete(id);S.likeCounts[id]=Math.max(0,(S.likeCounts[id]||1)-1)}
  else{S.likes.add(id);S.likeCounts[id]=(S.likeCounts[id]||0)+1}
  render();
  try{
    const{error:le}=liked
      ?await sb.from('likes').delete().eq('post_id',id).eq('liker',S.me)
      :await sb.from('likes').insert({post_id:id,liker:S.me});
    if(le){toast('좋아요 실패: '+le.message,'error');console.error('like err:',le);await loadAll()}
  }catch(e){toast('좋아요 오류','error');console.error(e);await loadAll()}
}

let _mentionState={active:false,query:'',inputId:null,selectedIdx:0,matches:[]};
function setupMentionAutocomplete(inputId){const inp=document.getElementById(inputId);if(!inp||inp._mentionSetup)return;inp._mentionSetup=true;inp.addEventListener('input',function(){const val=this.value;const cursor=this.selectionStart;const before=val.slice(0,cursor);const atMatch=before.match(/@(\w*)$/);if(atMatch){_mentionState={active:true,query:atMatch[1].toLowerCase(),inputId,selectedIdx:0,matches:Object.keys(S.users).filter(n=>n.toLowerCase().includes(atMatch[1].toLowerCase())&&n!==S.me).slice(0,6)};showMentionPop(this)}else closeMentionPop()});inp.addEventListener('keydown',function(e){if(!_mentionState.active||!_mentionState.matches.length)return;if(e.key==='ArrowDown'){e.preventDefault();_mentionState.selectedIdx=(_mentionState.selectedIdx+1)%_mentionState.matches.length;updateMentionPop()}else if(e.key==='ArrowUp'){e.preventDefault();_mentionState.selectedIdx=(_mentionState.selectedIdx-1+_mentionState.matches.length)%_mentionState.matches.length;updateMentionPop()}else if(e.key==='Enter'||e.key==='Tab'){if(_mentionState.active&&_mentionState.matches.length){e.preventDefault();pickMention(_mentionState.matches[_mentionState.selectedIdx])}}else if(e.key==='Escape')closeMentionPop()});inp.addEventListener('blur',()=>setTimeout(closeMentionPop,150))}
function showMentionPop(el){let pop=document.getElementById('mention-autocomplete');if(!pop){pop=document.createElement('div');pop.id='mention-autocomplete';pop.className='mention-pop';document.body.appendChild(pop)}const r=el.getBoundingClientRect();pop.style.cssText=`position:fixed;left:${r.left}px;bottom:${window.innerHeight-r.top+4}px;display:block`;updateMentionPop()}
function updateMentionPop(){const pop=document.getElementById('mention-autocomplete');if(!pop)return;const {matches,selectedIdx}=_mentionState;if(!matches.length){pop.innerHTML=`<div style="padding:12px;font-size:13px;color:var(--text3);text-align:center">없음</div>`;return}pop.innerHTML=matches.map((nick,i)=>`<div class="mention-item ${i===selectedIdx?'selected':''}" onmousedown="event.preventDefault();pickMention('${nick}')"><div class="av"><img src="${avatarOf(nick)}" style="width:28px;height:28px;border-radius:50%"></div><span style="font-weight:600;font-size:13px">${esc(nick)}</span></div>`).join('')}
function pickMention(nick){
  const inp=document.getElementById(_mentionState.inputId);
  if(!inp)return;
  if(inp.isContentEditable){
    const sel=window.getSelection();
    if(!sel||!sel.rangeCount)return;
    const r=sel.getRangeAt(0);
    const node=r.startContainer;
    const txt=node.textContent||'';
    const off=r.startOffset;
    const before=txt.slice(0,off).replace(/@\w*$/,'');
    node.textContent=before+'@'+nick+' '+txt.slice(off);
    const newR=document.createRange();
    newR.setStart(node,before.length+nick.length+2);
    newR.collapse(true);
    sel.removeAllRanges();sel.addRange(newR);
  }else{
    const val=inp.value;const cursor=inp.selectionStart;
    const before=val.slice(0,cursor).replace(/@\w*$/,'@'+nick+' ');
    inp.value=before+val.slice(cursor);
    inp.focus();inp.selectionStart=inp.selectionEnd=before.length;
  }
  closeMentionPop();
}
function closeMentionPop(){_mentionState.active=false;const pop=document.getElementById('mention-autocomplete');if(pop)pop.style.display='none'}

function openNfColorPicker(){
  if(document.getElementById('nf-cpicker'))return;
  const swatch=document.getElementById('nf-color-swatch');
  if(!swatch)return;
  const rect=swatch.getBoundingClientRect();

  const pop=document.createElement('div');
  pop.id='nf-cpicker';
  pop.style.cssText=`position:fixed;z-index:9999;background:var(--card);border:1px solid var(--line2);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.18);padding:14px;width:240px;top:${Math.min(rect.bottom+8, window.innerHeight-300)}px;left:${Math.min(rect.left, window.innerWidth-250)}px;user-select:none`;

  pop.innerHTML=`
    <canvas id="nf-cp-canvas" width="212" height="140" style="width:212px;height:140px;border-radius:10px;cursor:crosshair;display:block"></canvas>
    <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
      <canvas id="nf-cp-hue" width="180" height="16" style="width:180px;height:16px;border-radius:8px;cursor:pointer;flex:1"></canvas>
      <div id="nf-cp-preview" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--line2);flex-shrink:0"></div>
    </div>
    <div style="margin-top:8px;display:flex;align-items:center;gap:6px">
      <span style="font-size:12px;color:var(--text3)">#</span>
      <input id="nf-cp-hex" maxlength="6" style="flex:1;background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:13px;font-family:monospace;color:var(--text);outline:none" oninput="nfCpHexInput(this.value)">
      <button onclick="closeNfColorPicker(true)" style="padding:5px 10px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;border:none;white-space:nowrap;flex-shrink:0">확인</button>
    </div>`;

  document.body.appendChild(pop);

  // State
  let hue=0, sat=1, val=1, cpDragging=false, hueDragging=false;

  // Parse current color
  function hexToHsv(hex){
    hex=hex.replace('#','');
    if(hex.length!==6)return{h:0,s:1,v:1};
    const r=parseInt(hex.slice(0,2),16)/255,g=parseInt(hex.slice(2,4),16)/255,b=parseInt(hex.slice(4,6),16)/255;
    const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
    let h=0;
    if(d){if(max===r)h=((g-b)/d)%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=((h*60)+360)%360}
    return{h,s:max?d/max:0,v:max};
  }
  function hsvToHex(h,s,v){
    const f=n=>{const k=(n+h/60)%6;return v-v*s*Math.max(0,Math.min(k,4-k,1))};
    const r=f(5),g=f(3),b=f(1);
    return '#'+[r,g,b].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');
  }

  const parsed=hexToHsv(nfColor);
  hue=parsed.h; sat=parsed.s; val=parsed.v;

  // Draw spectrum canvas
  const cv=document.getElementById('nf-cp-canvas');
  const ctx=cv.getContext('2d');
  function drawSpectrum(){
    const W=cv.width,H=cv.height;
    const hGrad=ctx.createLinearGradient(0,0,W,0);
    hGrad.addColorStop(0,'#fff');
    hGrad.addColorStop(1,`hsl(${hue},100%,50%)`);
    ctx.fillStyle=hGrad; ctx.fillRect(0,0,W,H);
    const vGrad=ctx.createLinearGradient(0,0,0,H);
    vGrad.addColorStop(0,'rgba(0,0,0,0)');
    vGrad.addColorStop(1,'#000');
    ctx.fillStyle=vGrad; ctx.fillRect(0,0,W,H);
    // cursor
    const cx=sat*W, cy=(1-val)*H;
    ctx.beginPath(); ctx.arc(cx,cy,7,0,Math.PI*2);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Draw hue slider
  const hc=document.getElementById('nf-cp-hue');
  const hctx=hc.getContext('2d');
  function drawHue(){
    const grad=hctx.createLinearGradient(0,0,hc.width,0);
    for(let i=0;i<=6;i++)grad.addColorStop(i/6,`hsl(${i*60},100%,50%)`);
    hctx.fillStyle=grad; hctx.fillRect(0,0,hc.width,hc.height);
  }

  function updatePreview(){
    const hex=hsvToHex(hue,sat,val);
    document.getElementById('nf-cp-preview').style.background=hex;
    const hi=document.getElementById('nf-cp-hex');
    if(hi&&document.activeElement!==hi)hi.value=hex.replace('#','');
  }

  drawSpectrum(); drawHue(); updatePreview();

  // Spectrum mouse events
  function pickSpectrum(e){
    const r=cv.getBoundingClientRect();
    sat=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    val=Math.max(0,Math.min(1,1-(e.clientY-r.top)/r.height));
    drawSpectrum(); updatePreview();
  }
  cv.onmousedown=e=>{cpDragging=true;pickSpectrum(e);e.preventDefault()};
  cv.ontouchstart=e=>{cpDragging=true;pickSpectrum(e.touches[0]);e.preventDefault()};

  // Hue slider
  function pickHue(e){
    const r=hc.getBoundingClientRect();
    hue=Math.max(0,Math.min(360,((e.clientX-r.left)/r.width)*360));
    drawSpectrum(); updatePreview();
  }
  hc.onmousedown=e=>{hueDragging=true;pickHue(e);e.preventDefault()};
  hc.ontouchstart=e=>{hueDragging=true;pickHue(e.touches[0]);e.preventDefault()};

  document.addEventListener('mousemove',function onMove(e){
    if(cpDragging)pickSpectrum(e);
    else if(hueDragging)pickHue(e);
  });
  document.addEventListener('mouseup',function onUp(){cpDragging=false;hueDragging=false});
  document.addEventListener('touchmove',function onTM(e){
    if(cpDragging)pickSpectrum(e.touches[0]);
    else if(hueDragging)pickHue(e.touches[0]);
    e.preventDefault();
  },{passive:false});
  document.addEventListener('touchend',function onTE(){cpDragging=false;hueDragging=false});

  // Hex input handler
  window.nfCpHexInput=function(v){
    if(v.length===6){const p=hexToHsv(v);hue=p.h;sat=p.s;val=p.v;drawSpectrum();updatePreview();}
  };

  let outsideClick=null;
  window.closeNfColorPicker=function(apply){
    if(apply){const hex=hsvToHex(hue,sat,val);pickNfColor(hex);}
    pop.remove();
    if(outsideClick)document.removeEventListener('mousedown',outsideClick);
  };

  // Close on outside click
  setTimeout(()=>{
    outsideClick=function(e){if(!pop.contains(e.target)&&e.target!==swatch){closeNfColorPicker(false)}}
    document.addEventListener('mousedown',outsideClick);
  },100);
}

// ═══ 트렌딩 태그 ═══
function getTrendingTags(){
  const tagMap={};
  S.posts.forEach(p=>(p.tags||[]).forEach(t=>{tagMap[t]=(tagMap[t]||0)+1}));
  return Object.entries(tagMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
}

// ═══ 주간 TOP ═══
function getWeeklyTop(){
  const weekAgo=Date.now()-7*24*60*60*1000;
  return S.posts
    .filter(p=>{
      const ch=S.channels[p.channel_id];
      if(ch&&ch.type==='chat')return false;
      if((p.title||'').startsWith('reply:'))return false;
      return new Date(p.created_at).getTime()>weekAgo;
    })
    .sort((a,b)=>((S.likeCounts[b.id]||0)+(b.comments||[]).length)-((S.likeCounts[a.id]||0)+(a.comments||[]).length))
    .slice(0,5);
}

function fsPick(color, event){
  if(event)event.stopPropagation();
  document.getElementById('fs-color').value=color;

}
function openFsColorPicker(){
  const inp=document.getElementById('fs-color');
  const preview=document.getElementById('fs-color-preview');
  if(!inp)return;
  const swatch=preview||inp;
  const rect=swatch.getBoundingClientRect();
  if(document.getElementById('fs-cpicker'))return;
  const pop=document.createElement('div');pop.id='fs-cpicker';
  const popTop=Math.min(rect.bottom+8,window.innerHeight-320);
  const popLeft=Math.min(rect.left,window.innerWidth-260);
  pop.style.cssText=`position:fixed;z-index:9999;background:var(--card);border:1px solid var(--line2);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.22);padding:14px;width:248px;top:${popTop}px;left:${popLeft}px;user-select:none`;

  // HSV helpers
  function hexToHsv(hex){let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;let h=0,s=max===0?0:d/max,v=max;if(d!==0){if(max===r)h=(g-b)/d%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=Math.round(h*60);if(h<0)h+=360}return{h,s,v}}
  function hsvToHex(h,s,v){const f=n=>{const k=(n+h/60)%6;return Math.round((v-v*s*Math.max(0,Math.min(k,4-k,1)))*255)};const r=f(5),g=f(3),b=f(1);return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}

  let cur=inp.value&&inp.value.length===7?inp.value:'#4a6cf7';
  let {h,s,v}=hexToHsv(cur);

  pop.innerHTML=`
    <canvas id="fsc-spectrum" width="220" height="140" style="border-radius:10px;cursor:crosshair;display:block;margin-bottom:10px"></canvas>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <canvas id="fsc-hue" width="180" height="14" style="border-radius:7px;cursor:pointer;flex:1"></canvas>
      <div id="fsc-cur" style="width:28px;height:28px;border-radius:8px;border:2px solid var(--line2);flex-shrink:0"></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:12px;color:var(--text3)">#</span>
      <input id="fsc-hex" maxlength="6" value="${cur.replace('#','')}" style="flex:1;background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:13px;font-family:monospace;color:var(--text);outline:none">
      <button onclick="document.getElementById('fs-cpicker')?.remove()" style="padding:5px 10px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;border:none;white-space:nowrap;flex-shrink:0">확인</button>
    </div>`;

  document.body.appendChild(pop);

  const specCanvas=document.getElementById('fsc-spectrum');
  const hueCanvas=document.getElementById('fsc-hue');
  const hexInp=document.getElementById('fsc-hex');
  const curDiv=document.getElementById('fsc-cur');

  function drawSpectrum(){
    const ctx=specCanvas.getContext('2d');
    const W=specCanvas.width,H=specCanvas.height;
    const hueColor=hsvToHex(h,1,1);
    const grad=ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,'#fff');grad.addColorStop(1,hueColor);
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    const grad2=ctx.createLinearGradient(0,0,0,H);
    grad2.addColorStop(0,'transparent');grad2.addColorStop(1,'#000');
    ctx.fillStyle=grad2;ctx.fillRect(0,0,W,H);
    // cursor
    const cx=s*W,cy=(1-v)*H;
    ctx.beginPath();ctx.arc(cx,cy,7,0,2*Math.PI);
    ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.arc(cx,cy,7,0,2*Math.PI);
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;ctx.stroke();
  }
  function drawHue(){
    const ctx=hueCanvas.getContext('2d');
    const W=hueCanvas.width,H=hueCanvas.height;
    const grad=ctx.createLinearGradient(0,0,W,0);
    for(let i=0;i<=6;i++)grad.addColorStop(i/6,`hsl(${i*60},100%,50%)`);
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    const cx=h/360*W;
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
  }
  function updateAll(){
    const hex=hsvToHex(h,s,v);
    curDiv.style.background=hex;
    hexInp.value=hex.replace('#','');
    fsPick(hex);
    drawSpectrum();drawHue();
  }

  function specClick(e){
    const r=specCanvas.getBoundingClientRect();
    s=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    v=Math.max(0,Math.min(1,1-(e.clientY-r.top)/r.height));
    updateAll();
  }
  function hueClick(e){
    const r=hueCanvas.getBoundingClientRect();
    h=Math.max(0,Math.min(360,(e.clientX-r.left)/r.width*360));
    updateAll();
  }

  specCanvas.addEventListener('mousedown',function sd(e){specClick(e);function mm(e){specClick(e)}function mu(){document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)}document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu)});
  hueCanvas.addEventListener('mousedown',function hd(e){hueClick(e);function mm(e){hueClick(e)}function mu(){document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)}document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu)});
  hexInp.addEventListener('input',function(){if(this.value.length===6){const hex='#'+this.value;const parsed=hexToHsv(hex);h=parsed.h;s=parsed.s;v=parsed.v;updateAll()}});

  updateAll();
  setTimeout(()=>document.addEventListener('mousedown',function oc(e){if(!pop.contains(e.target)&&e.target!==swatch){pop.remove();document.removeEventListener('mousedown',oc)}},),100);
}

let tutStep=0,tutEls={};

function startTutorial(){
  if(document.getElementById('tut-overlay'))return;
  tutStep=0;
  const overlay=document.createElement('div');
  overlay.id='tut-overlay';
  overlay.className='tut-overlay';
  overlay.innerHTML='<div class="tut-dim" onclick="skipTutorial()"></div><div id="tut-highlight" class="tut-highlight" style="display:none"></div><div id="tut-card" class="tut-card"></div>';
  document.body.appendChild(overlay);
  showTutStep();
}

function showTutStep(){
  const step=TUT_STEPS[tutStep];
  if(!step){endTutorial();return}
  const card=document.getElementById('tut-card');
  const hl=document.getElementById('tut-highlight');
  if(!card)return;

  const total=TUT_STEPS.length;
  const isLast=tutStep===total-1;
  const isFirst=tutStep===0;

  card.innerHTML=`
    <div class="tut-step">${tutStep+1} / ${total}</div>
    <h3>${step.emoji} ${step.title}</h3>
    <p>${step.desc}</p>
    <div class="tut-btns">
      ${isFirst?`<button class="tut-skip" onclick="skipTutorial()">건너뛰기</button>`:`<button class="tut-skip" onclick="prevTutStep()">이전</button>`}
      <button class="tut-next" onclick="${isLast?'endTutorial()':'nextTutStep()'}">
        ${isLast?'시작하기! 🚀':'다음'}
      </button>
    </div>`;

  // 타겟 하이라이트
  const targetEl=step.target?document.querySelector(step.target):null;
  if(targetEl){
    const r=targetEl.getBoundingClientRect();
    hl.style.display='block';
    hl.style.top=(r.top-6)+'px';
    hl.style.left=(r.left-6)+'px';
    hl.style.width=(r.width+12)+'px';
    hl.style.height=(r.height+12)+'px';
    // 카드 위치
    const cardW=320;
    let cx=r.left,cy=r.bottom+16;
    if(cy+200>window.innerHeight)cy=r.top-200;
    if(cx+cardW>window.innerWidth)cx=window.innerWidth-cardW-16;
    if(cx<12)cx=12;
    card.style.top=Math.max(12,cy)+'px';
    card.style.left=cx+'px';
  }else{
    hl.style.display='none';
  }
  if(targetEl){
    card.style.transform='none';
  }else{
    card.style.top='50%';card.style.left='50%';card.style.transform='translate(-50%,-50%)';
  }
}

function nextTutStep(){tutStep++;showTutStep()}
function prevTutStep(){if(tutStep>0){tutStep--;showTutStep()}}
function skipTutorial(){endTutorial()}
function endTutorial(){
  const el=document.getElementById('tut-overlay');
  if(el)el.remove();
  localStorage.setItem('tut_done','1');
}
function checkTutorial(){
  if(!localStorage.getItem('tut_done')&&S.me){
    setTimeout(()=>startTutorial(),800);
  }
}
